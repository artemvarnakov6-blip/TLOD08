<!DOCTYPE html>
<html>
<head>
<title>TLOD 08</title>

<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
background:#00ff00;
border:none;
cursor:pointer;
}

#panel{
display:none;
}
</style>

<script>
function login(){

let pass = document.getElementById("pass").value;

if(pass === "TLOD08"){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
}
else{
alert("Wrong password");
}

}
</script>

</head>

<body>

<div id="login">

<h1>TLOD 08 ACCESS</h1>

<p>ENTER PASSWORD</p>

<input type="password" id="pass">

<br><br>

<button onclick="login()">LOGIN</button>

</div>

<div id="panel">

<h1>ACCESS GRANTED</h1>

<p>Welcome to TLOD08 system</p>

</div>

</body>
</html>
