<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabinet 32 | Team Lead Panel</title>

  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="%23fff0a6"/>
        <stop offset="45%" stop-color="%23ffd700"/>
        <stop offset="100%" stop-color="%23b8860b"/>
      </linearGradient>
    </defs>
    <rect width="64" height="64" rx="14" fill="%23070707"/>
    <text x="32" y="43" text-anchor="middle" font-size="20" font-family="Arial" font-weight="700" fill="url(%23g)">32</text>
  </svg>'>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    :root{
      --gold:#ffd700;
      --gold-soft:#d4af37;
      --bg:#050505;
      --card:#111111;
      --text:#ffffff;
      --muted:#cbbd88;
      --danger:#ff7b7b;
      --success:#8ff0a4;
      --blue:#9dc7ff;
      --border:rgba(255,215,0,.20);
      --shadow:0 0 30px rgba(255,215,0,.08);
    }

    body{
      background:
        radial-gradient(circle at top, rgba(255,215,0,.07), transparent 28%),
        linear-gradient(135deg,#000000,#090909 45%,#000000 100%);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      width:900px;
      height:900px;
      left:-240px;
      top:-300px;
      background:radial-gradient(circle, rgba(255,215,0,.10), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      animation:floatGlow1 14s ease-in-out infinite alternate;
    }

    body::after{
      content:"";
      position:fixed;
      width:800px;
      height:800px;
      right:-240px;
      bottom:-280px;
      background:radial-gradient(circle, rgba(212,175,55,.08), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      animation:floatGlow2 16s ease-in-out infinite alternate;
    }

    @keyframes floatGlow1{
      from{transform:translate(0,0);}
      to{transform:translate(140px,100px);}
    }

    @keyframes floatGlow2{
      from{transform:translate(0,0);}
      to{transform:translate(-140px,-100px);}
    }

    .particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 35% 70%, rgba(255,215,0,.08) 0 2px, transparent 3px),
        radial-gradient(circle at 50% 35%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 75% 25%, rgba(255,215,0,.12) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 70%, rgba(255,215,0,.09) 0 2px, transparent 3px);
      opacity:.7;
      animation:particlesMove 12s ease-in-out infinite alternate;
    }

    .trophies{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .trophy{
      position:absolute;
      color:rgba(255,215,0,.07);
      text-shadow:0 0 18px rgba(255,215,0,.08);
      user-select:none;
      animation:floatCup 8s ease-in-out infinite alternate;
    }

    .trophy.t1{top:8%; left:6%; font-size:72px;}
    .trophy.t2{top:18%; right:8%; font-size:52px; animation-duration:10s;}
    .trophy.t3{bottom:12%; left:10%; font-size:64px; animation-duration:11s;}
    .trophy.t4{bottom:18%; right:12%; font-size:58px; animation-duration:9s;}
    .trophy.t5{top:44%; left:2%; font-size:40px; animation-duration:12s;}
    .trophy.t6{top:55%; right:3%; font-size:44px; animation-duration:13s;}
    .trophy.t7{top:68%; left:28%; font-size:34px; animation-duration:10s;}
    .trophy.t8{top:28%; right:32%; font-size:38px; animation-duration:12s;}

    @keyframes floatCup{
      from{transform:translateY(0px);}
      to{transform:translateY(-12px);}
    }

    @keyframes particlesMove{
      from{transform:translateY(0);}
      to{transform:translateY(-16px);}
    }

    .corner{
      position:fixed;
      width:140px;
      height:140px;
      border:1px solid var(--border);
      z-index:1;
      pointer-events:none;
    }

    .top-left{top:24px;left:24px;border-right:none;border-bottom:none;}
    .top-right{top:24px;right:24px;border-left:none;border-bottom:none;}
    .bottom-left{bottom:24px;left:24px;border-right:none;border-top:none;}
    .bottom-right{bottom:24px;right:24px;border-left:none;border-top:none;}

    .hidden{display:none !important;}

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      z-index:2;
    }

    .login-box{
      width:430px;
      max-width:100%;
      background:linear-gradient(180deg, rgba(18,18,18,.95), rgba(6,6,6,.96));
      border:1px solid rgba(255,215,0,.28);
      border-radius:28px;
      padding:38px 28px;
      box-shadow:
        0 0 40px rgba(255,215,0,.10),
        inset 0 0 24px rgba(255,215,0,.04);
      text-align:center;
      animation:showUp .9s ease;
      position:relative;
      z-index:2;
    }

    @keyframes showUp{
      from{opacity:0; transform:translateY(16px);}
      to{opacity:1; transform:translateY(0);}
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border:1px solid rgba(255,215,0,.20);
      border-radius:999px;
      color:#f3de8f;
      background:rgba(255,215,0,.04);
      font-size:12px;
      letter-spacing:1px;
      margin-bottom:16px;
    }

    .gold-line{
      width:82px;
      height:3px;
      margin:0 auto 18px auto;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      box-shadow:0 0 16px rgba(255,215,0,.35);
    }

    h1{
      color:var(--gold);
      font-size:40px;
      letter-spacing:4px;
      text-shadow:0 0 12px rgba(255,215,0,.25);
      margin-bottom:10px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:2px;
      margin-bottom:24px;
    }

    .help{
      color:#9f9f9f;
      font-size:13px;
      line-height:1.6;
      margin-top:18px;
      text-align:left;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.05);
      border-radius:16px;
      padding:14px;
    }

    .input, .select{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(255,215,0,.18);
      background:#101010;
      color:white;
      outline:none;
      margin-bottom:14px;
      font-size:15px;
      transition:.2s;
    }

    .input:focus, .select:focus{
      border-color:var(--gold);
      box-shadow:0 0 14px rgba(255,215,0,.15);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#141414;
      font-weight:700;
      font-size:15px;
      letter-spacing:1px;
      transition:.2s;
      box-shadow:0 10px 25px rgba(255,215,0,.12);
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(255,215,0,.20);
    }

    .btn.secondary{
      background:transparent;
      color:var(--gold);
      border:1px solid rgba(255,215,0,.20);
      box-shadow:none;
    }

    .btn.small{
      width:auto;
      padding:10px 14px;
      font-size:13px;
      border-radius:12px;
    }

    .btn.red{
      background:linear-gradient(90deg,#6b1c1c,#ff7b7b,#b03030);
      color:#fff;
    }

    #loginMessage{
      min-height:22px;
      margin-top:12px;
      color:var(--danger);
      font-size:14px;
    }

    .app{
      min-height:100vh;
      padding:26px;
      position:relative;
      z-index:2;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:24px;
      padding:18px 20px;
      border:1px solid rgba(255,215,0,.14);
      background:rgba(12,12,12,.85);
      border-radius:22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      position:relative;
      z-index:2;
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .brand-icon{
      width:58px;
      height:58px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      border:1px solid rgba(255,215,0,.25);
      color:var(--gold);
      font-size:20px;
      font-weight:800;
      box-shadow:inset 0 0 14px rgba(255,215,0,.05);
    }

    .brand-title{
      font-size:24px;
      color:var(--gold);
      letter-spacing:2px;
      margin-bottom:4px;
    }

    .brand-sub{
      color:var(--muted);
      font-size:13px;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .user-chip{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,215,0,.16);
      color:#f0d983;
      background:rgba(255,215,0,.04);
      font-size:13px;
    }

    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
      position:relative;
      z-index:2;
    }

    .card{
      background:linear-gradient(180deg, rgba(18,18,18,.96), rgba(8,8,8,.96));
      border:1px solid rgba(255,215,0,.14);
      border-radius:24px;
      padding:20px;
      box-shadow:var(--shadow);
    }

    .card h2, .card h3{
      color:var(--gold);
      margin-bottom:14px;
      letter-spacing:1px;
    }

    .stat-card{grid-column:span 3; min-height:120px;}
    .wide{grid-column:span 8;}
    .side{grid-column:span 4;}
    .full{grid-column:span 12;}
    .operator-main{grid-column:span 8;}
    .operator-side{grid-column:span 4;}

    .stat-label{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:34px;
      color:#fff4c2;
      font-weight:800;
      margin-bottom:8px;
    }

    .stat-sub{
      color:#8e8e8e;
      font-size:13px;
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
      position:relative;
      z-index:2;
    }

    .tab-btn{
      border:1px solid rgba(255,215,0,.16);
      background:rgba(255,215,0,.04);
      color:#e7d084;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:13px;
      transition:.2s;
    }

    .tab-btn.active{
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#151515;
      font-weight:700;
    }

    .operators-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .operator-card{
      background:linear-gradient(180deg, rgba(24,24,24,.98), rgba(10,10,10,.96));
      border:1px solid rgba(255,215,0,.14);
      border-radius:20px;
      padding:18px;
    }

    .operator-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .operator-name{
      font-size:22px;
      color:#ffe89a;
      font-weight:700;
    }

    .status{
      font-size:12px;
      border-radius:999px;
      padding:7px 10px;
      background:rgba(143,240,164,.08);
      color:var(--success);
      border:1px solid rgba(143,240,164,.18);
    }

    .mini-stats{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .mini{
      padding:12px;
      border-radius:16px;
      background:rgba(255,215,0,.04);
      border:1px solid rgba(255,215,0,.08);
    }

    .mini .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .mini .value{
      font-size:22px;
      color:#fff2b6;
      font-weight:700;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:12px;
    }

    textarea.input{
      min-height:100px;
      resize:vertical;
    }

    .entry-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:16px;
    }

    .entry{
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
    }

    .entry-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .entry-title{
      color:#ffe89a;
      font-weight:700;
    }

    .entry-meta{
      color:#9a9a9a;
      font-size:12px;
    }

    .entry-text{
      color:#d7d7d7;
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
    }

    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.8px;
      text-transform:uppercase;
      border:1px solid rgba(255,215,0,.14);
      background:rgba(255,215,0,.05);
      color:#f1d67d;
    }

    .tag.red{
      color:#ff9d9d;
      border-color:rgba(255,123,123,.16);
      background:rgba(255,123,123,.06);
    }

    .tag.green{
      color:#9ef0b0;
      border-color:rgba(143,240,164,.16);
      background:rgba(143,240,164,.06);
    }

    .tag.blue{
      color:#9dc7ff;
      border-color:rgba(125,180,255,.16);
      background:rgba(125,180,255,.06);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .empty{
      color:#8c8c8c;
      font-size:14px;
      padding:14px 0 4px 0;
    }

    .operator-dashboard{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
      position:relative;
      z-index:2;
    }

    .profile-hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .profile-name{
      font-size:30px;
      color:#ffe89a;
      margin-bottom:6px;
    }

    .profile-role{
      color:var(--muted);
      text-transform:uppercase;
      font-size:13px;
      letter-spacing:1px;
    }

    .note-box{
      padding:14px;
      border-radius:16px;
      background:rgba(255,215,0,.04);
      border:1px solid rgba(255,215,0,.08);
      color:#ddd;
      line-height:1.55;
      font-size:14px;
    }

    .list-simple{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
    }

    .list-item{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
      color:#ddd;
      font-size:14px;
      line-height:1.5;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
    }

    th, td{
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid rgba(255,215,0,.08);
      font-size:14px;
      vertical-align:top;
    }

    th{
      color:#f3db86;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1px;
      font-size:12px;
    }

    .rank-num{
      font-size:20px;
      font-weight:800;
      color:#fff1a8;
    }

    .bonus-banner{
      margin-bottom:18px;
      padding:16px 18px;
      border:1px solid rgba(255,215,0,.18);
      border-radius:18px;
      background:linear-gradient(90deg, rgba(255,215,0,.08), rgba(255,215,0,.03));
      color:#ffe89a;
      box-shadow:var(--shadow);
    }

    .exclamation{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:22px;
      height:22px;
      border-radius:999px;
      background:rgba(255,123,123,.15);
      color:#ff9d9d;
      font-weight:700;
      border:1px solid rgba(255,123,123,.22);
      margin-right:8px;
    }

    .score-big{
      font-size:28px;
      font-weight:800;
      color:#fff3bf;
    }

    @media (max-width: 1100px){
      .stat-card{grid-column:span 6;}
      .wide, .side, .operator-main, .operator-side{grid-column:span 12;}
      .operators-grid{grid-template-columns:1fr;}
    }

    @media (max-width: 720px){
      .app{padding:14px;}
      .topbar{padding:16px; border-radius:18px;}
      .dashboard-grid{gap:14px;}
      .stat-card{grid-column:span 12;}
      .form-grid, .mini-stats{grid-template-columns:1fr;}
      .profile-name{font-size:24px;}
      h1{font-size:34px;}
    }
  </style>
</head>

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(n){
      return "$" + Number(n || 0).toLocaleString("en-US");
    }

    function avg(arr){
      if (!arr.length) return 0;
      return arr.reduce((a,b)=>a+b,0) / arr.length;
    }

    function login() {
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("loginMessage");

      if (!users[username] || users[username].password !== password) {
        message.textContent = "Невірний логін або пароль";
        return;
      }

      currentUser = {
        username,
        role: users[username].role,
        displayName: users[username].displayName
      };

      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.title = `Cabinet 32 | ${currentUser.displayName}`;
      renderApp();
    }

    function logout() {
      currentUser = null;
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("loginMessage").textContent = "";
      document.getElementById("password").value = "";
      document.title = "Cabinet 32 | Team Lead Panel";
    }

    function setAdminTab(tab){
      adminTab = tab;
      renderApp();
    }

    function renderApp() {
      const app = document.getElementById("appScreen");
      if (!currentUser) return;

      if (currentUser.role === "admin") {
        app.innerHTML = renderAdminDashboard();
      } else {
        app.innerHTML = renderOperatorDashboard(currentUser.username);
      }

    function getRyuTuStats(op){
      const items = op.ryuTu || [];
      const totalRyu = items.reduce((s, i) => s + Number(i.ryu || 0), 0);
      const totalTu = items.reduce((s, i) => s + Number(i.tu || 0), 0);
      const avgBalance = items.length ? items.reduce((s, i) => s + Number(i.balance || 0), 0) / items.length : 0;
      const avgScore = items.length ? items.reduce((s, i) => s + Number(i.score || 0), 0) / items.length : 0;
      return {
        totalRyu,
        totalTu,
        avgBalance,
        avgScore
      };
    }

    function getOperatorScore(op){
      const reportAvg = op.reports.length ? avg(op.reports.map(r => Number(r.score || 0))) : 0;
      const rtuAvg = op.ryuTu.length ? avg(op.ryuTu.map(r => Number(r.score || 0))) : 0;
      const revenueFactor = Number(op.stats.revenue || 0);
      const normPercent = op.norm ? (Number(op.stats.revenue || 0) / Number(op.norm)) * 100 : 0;
      const weekScore = Number(op.weekScore || 0);
      const finePenalty = Number(op.stats.fineDollars || 0) * 1.5;
      const errorsPenalty = (op.errors.length + op.improvements.length) * 8;

      return Math.round(
        revenueFactor * 0.7 +
        normPercent * 2 +
        reportAvg * 8 +
        rtuAvg * 8 +
        weekScore * 8 -
        finePenalty -
        errorsPenalty
      );
    }

    function getGlobalStats() {
      const ops = Object.values(state.operators);
      const totalRequests = ops.reduce((sum, op) => sum + Number(op.stats.requests || 0), 0);
      const totalRevenue = ops.reduce((sum, op) => sum + Number(op.stats.revenue || 0), 0);
      const totalFines = ops.reduce((sum, op) => sum + Number(op.stats.fineDollars || 0), 0);
      const totalReports = ops.reduce((sum, op) => sum + op.reports.length, 0);

      return {
        totalRequests,
        totalRevenue: money(totalRevenue),
        totalFines: money(totalFines),
        totalReports
      };
    }

    function getRankedOperators() {
      const list = Object.entries(state.operators).map(([key, op]) => {
        return {
          key,
          ...op,
          score: getOperatorScore(op)
        };
      });

      list.sort((a,b) => b.score - a.score);
      return list;
    }

                <div class="label">РЮ</div>
                <div class="value">${r.totalRyu}</div>
              </div>
              <div class="mini">
                <div class="label">ТЮ</div>
                <div class="value">${r.totalTu}</div>
              </div>
              <div class="mini">
                <div class="label">Оцінка звітів</div>
                <div class="value">${reportAvg}</div>
              </div>
              <div class="mini">
                <div class="label">Оцінка РЮ/ТЮ</div>
                <div class="value">${rtuAvg}</div>
              </div>
            </div>
          </div>

          <div class="card operator-side">
            <h3>Оцінка тижня</h3>
            <div class="score-big">${Number(op.weekScore || 0)}/10</div>
            <div class="help" style="margin-top:14px;">Оцінку виставляє Team Lead.</div>
          </div>

          <div class="card operator-main">
            <h3>Мої звіти</h3>
            <div class="entry-list">
              ${op.reports.length ? op.reports.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title"><span class="exclamation">!</span>${escapeHtml(item.title)}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      <span class="tag blue">Оцінка: ${Number(item.score || 0)}/10</span>
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  <div class="entry-text">${escapeHtml(item.text || "")}</div>
                  ${item.problem ? `<div class="entry-meta" style="margin-top:10px;">Проблема: ${escapeHtml(item.problem)}</div>` : ""}
                </div>
              `).join("") : `<div class="empty">Поки звітів немає.</div>`}
            </div>
          </div>

          <div class="card operator-side">
            <h3>Позитивні якості</h3>
            <div class="list-simple">
              ${op.strengths.length ? op.strengths.map(item => `<div class="list-item">${escapeHtml(item)}</div>`).join("") : `<div class="empty">Поки пусто</div>`}
            </div>
          </div>

          <div class="card operator-main">
            <h3>РЮ / ТЮ</h3>
            <div class="entry-list">
              ${op.ryuTu.length ? op.ryuTu.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title">РЮ: ${item.ryu} • ТЮ: ${item.tu}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      <span class="tag green">Оцінка: ${Number(item.score || 0)}/10</span>
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  <div class="entry-text">Середній баланс: ${money(item.balance)}</div>
                  ${item.problem ? `<div class="entry-meta" style="margin-top:10px;">Проблема: ${escapeHtml(item.problem)}</div>` : ""}
                </div>
              `).join("") : `<div class="empty">Поки записів немає.</div>`}
            </div>
          </div>

          <div class="card operator-side">
            <h3>Що покращити</h3>
            <div class="list-simple">
              ${op.improvements.length ? op.improvements.map(item => `<div class="list-item"><strong>${escapeHtml(item.title)}</strong><br>${escapeHtml(item.text)}</div>`).join("") : `<div class="empty">Поки пусто</div>`}
            </div>
          </div>

          <div class="card operator-main">
            <h3>План на тиждень</h3>
            <div class="list-simple">
              ${op.weeklyPlan.length ? op.weeklyPlan.map(item => `<div class="list-item">${escapeHtml(item)}</div>`).join("") : `<div class="empty">План ще не доданий</div>`}
            </div>
          </div>
        </div>
      `);
    }

    function addReport(){
      const operator = document.getElementById("reportOperator").value;
      const title = document.getElementById("reportTitle").value.trim();
      const text = document.getElementById("reportText").value.trim();
      const score = Number(document.getElementById("reportScore").value || 0);
      const problem = document.getElementById("reportProblem").value.trim();

      if (!title) {
        alert("Введи назву звіту");
        return;
      }

      state.operators[operator].reports.unshift({
        id:createId(),
        date:new Date().toISOString().slice(0,10),
        title,
        text,
        score,
        problem
      });

      saveData();
      renderApp();
    }

    function addRyuTu(){
      const operator = document.getElementById("rtOperator").value;
      const ryu = Number(document.getElementById("rtRyu").value || 0);
      const tu = Number(document.getElementById("rtTu").value || 0);
      const balance = Number(document.getElementById("rtBalance").value || 0);
      const score = Number(document.getElementById("rtScore").value || 0);
      const problem = document.getElementById("rtProblem").value.trim();

      state.operators[operator].ryuTu.unshift({
        id:createId(),
        date:new Date().toISOString().slice(0,10),
        ryu,
        tu,
        balance,
        score,
        problem
      });

      saveData();
      renderApp();
    }

    function addImprove(){
      const operator = document.getElementById("improveOperator").value;
      const title = document.getElementById("improveTitle").value.trim();
      const text = document.getElementById("improveText").value.trim();

      if (!title || !text) {
        alert("Заповни заголовок і текст");
        return;
      }

      state.operators[operator].improvements.unshift({
        id:createId(),
        date:new Date().toISOString().slice(0,10),
        title,
        text
      });

      saveData();
      renderApp();
    }

    function addStrength(){
      const operator = document.getElementById("strengthOperator").value;
      const text = document.getElementById("strengthText").value.trim();

      if (!text) {
        alert("Напиши сильну сторону");
        return;
      }

      state.operators[operator].strengths.unshift(text);
      saveData();
      renderApp();
    }

    function addWeekPlan(){
      const operator = document.getElementById("weekOperator").value;
      const text = document.getElementById("weekText").value.trim();

      if (!text) {
        alert("Напиши пункт плану");
        return;
      }

      state.operators[operator].weeklyPlan.unshift(text);
      saveData();
      renderApp();
    }

    function setWeekScore(){
      const operator = document.getElementById("weekScoreOperator").value;
      const value = Number(document.getElementById("weekScoreValue").value || 0);

      state.operators[operator].weekScore = value;
      saveData();
      renderApp();
    }

    function openOperatorPreview(operatorKey) {
      const savedUser = currentUser;
      currentUser = {
        username: operatorKey,
        role: "operator",
        displayName: state.operators[operatorKey].name
      };
      renderApp();

      const app = document.getElementById("appScreen");
      const backBar = document.createElement("div");
      backBar.style.marginBottom = "16px";
      backBar.innerHTML = `<button class="btn secondary small" onclick="backToAdmin()">← Назад до Team Lead</button>`;
      app.prepend(backBar);

      window.backToAdmin = function() {
        currentUser = savedUser;
        renderApp();
      };
    }
  </script>
</body>
</html>
