<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLOD 08</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #111, #1a1a1a);
      color: white;
      height: 100vh;
      position: relative;
    }

    .money {
      position: absolute;
      top: -120px;
      font-size: 42px;
      opacity: 0.18;
      animation: fall linear infinite;
      user-select: none;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-120px) rotate(0deg);
      }
      100% {
        transform: translateY(120vh) rotate(360deg);
      }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,255,100,0.08), rgba(0,0,0,0.85));
      backdrop-filter: blur(2px);
    }

    .center-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      max-width: 92%;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(0,255,100,0.25);
      border-radius: 22px;
      box-shadow: 0 0 30px rgba(0,255,100,0.15);
      padding: 35px 28px;
      text-align: center;
      animation: fadeIn 1.2s ease;
      z-index: 2;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -45%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
      color: #7dff9b;
      text-shadow: 0 0 10px rgba(125,255,155,0.35);
      letter-spacing: 2px;
    }

    .sub {
      color: #d7d7d7;
      margin-bottom: 24px;
      font-size: 14px;
      opacity: 0.9;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
      margin-bottom: 16px;
      transition: 0.25s;
    }

    input:focus {
      border-color: #7dff9b;
      box-shadow: 0 0 12px rgba(125,255,155,0.25);
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #32d96b, #78ff9e);
      color: #071108;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 18px rgba(120,255,158,0.35);
    }

    #message {
      margin-top: 14px;
      min-height: 20px;
      font-size: 14px;
      color: #ff7d7d;
    }

    #panel {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 3;
      background:
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.9)),
        url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      animation: showPanel 1s ease;
    }

    @keyframes showPanel {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .panel-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(0,0,0,0.55);
      padding: 40px 30px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 35px rgba(0,0,0,0.5);
      width: 520px;
      max-width: 92%;
    }

    .panel-content h2 {
      font-size: 38px;
      color: #7dff9b;
      margin-bottom: 14px;
    }

    .panel-content p {
      font-size: 18px;
      color: #f1f1f1;
      line-height: 1.5;
    }

    .glow {
      animation: glow 1.8s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 8px rgba(125,255,155,0.25); }
      to { text-shadow: 0 0 20px rgba(125,255,155,0.6); }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="money" style="left:5%; animation-duration:10s;">💸</div>
  <div class="money" style="left:12%; animation-duration:14s; animation-delay:1s;">💵</div>
  <div class="money" style="left:20%; animation-duration:11s; animation-delay:2s;">💰</div>
  <div class="money" style="left:28%; animation-duration:13s; animation-delay:0s;">💸</div>
  <div class="money" style="left:38%; animation-duration:9s; animation-delay:3s;">💵</div>
  <div class="money" style="left:48%; animation-duration:15s; animation-delay:1s;">💰</div>
  <div class="money" style="left:58%; animation-duration:12s; animation-delay:4s;">💸</div>
  <div class="money" style="left:68%; animation-duration:10s; animation-delay:2s;">💵</div>
  <div class="money" style="left:79%; animation-duration:14s; animation-delay:1s;">💰</div>
  <div class="money" style="left:89%; animation-duration:11s; animation-delay:3s;">💸</div>

  <div id="login" class="center-box">
    <h1 class="glow">TLOD 08</h1>
    <div class="sub">Закритий доступ • Premium Cabinet</div>
    <input type="password" id="pass" placeholder="Введи пароль">
    <button onclick="login()">Увійти</button>
    <div id="message"></div>
  </div>

  <div id="panel">
    <div class="panel-content">
      <h2 class="glow">ACCESS GRANTED</h2>
      <p>Ласкаво просимо в приватний кабінет TLOD 08.</p>
      <p style="margin-top:10px;">Система активована. Доступ дозволено.</p>
    </div>
  </div>

  <script>
    function login() {
      let pass = document.getElementById("pass").value;
      let message = document.getElementById("message");

      if (pass === "TLOD08") {
        document.getElementById("login").style.display = "none";
        document.getElementById("panel").style.display = "block";
      } else {
        message.textContent = "Неправильний пароль";
      }
    }
  </script>
</body>
</html>
