      50%{box-shadow:0 0 16px rgba(255,123,123,.18);}
    }

    .score-big{
      font-size:30px;
      font-weight:800;
      color:#fff3bf;
      text-shadow:0 0 16px rgba(255,215,0,.08);
    }

    .image-preview{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:16px;
      border:1px solid rgba(255,215,0,.10);
      margin-top:10px;
      transition:.25s;
    }

    .image-preview:hover{
      transform:scale(1.01);
      box-shadow:0 10px 24px rgba(0,0,0,.25);
    }

    .rating-table-wrap{
      overflow:auto;
    }

    @media (max-width: 1100px){
      .stat-card{grid-column:span 6;}
      .wide, .side, .operator-main, .operator-side{grid-column:span 12;}
      .operators-grid{grid-template-columns:1fr;}
    }

    @media (max-width: 720px){
      .app{padding:14px;}
      .topbar{padding:16px; border-radius:18px;}
      .dashboard-grid,.operator-dashboard{gap:14px;}
      .stat-card{grid-column:span 12;}
      .form-grid, .mini-stats{grid-template-columns:1fr;}
      .profile-name{font-size:24px;}
      h1{font-size:34px;}
    }
  </style>
</head>
<body>
  <div class="particles"></div>

  <div class="trophies">
    <div class="trophy t1">🏆</div>
    <div class="trophy t2">🏆</div>
    <div class="trophy t3">🏆</div>
    <div class="trophy t4">🏆</div>
    <div class="trophy t5">🏆</div>
    <div class="trophy t6">🏆</div>
    <div class="trophy t7">🏆</div>
    <div class="trophy t8">🏆</div>
    <div class="trophy t9">🏆</div>
    <div class="trophy t10">🏆</div>
  </div>

  <div class="corner top-left"></div>
  <div class="corner top-right"></div>
  <div class="corner bottom-left"></div>
  <div class="corner bottom-right"></div>

  <div id="loginScreen" class="screen">
    <div class="login-box">
      <div class="badge">Private Luxury Access</div>
      <div class="gold-line"></div>
      <h1>CABINET 32</h1>
      <div class="subtitle">Luxury Team Control Panel</div>

      <input id="username" class="input" type="text" placeholder="Логін">
      <input id="password" class="input" type="password" placeholder="Пароль">
      <button class="btn" onclick="login()">ENTER THE CABINET</button>
      <div id="loginMessage"></div>

      <div class="help">
        Оператори самі подають РЮ / ТЮ та звіти.
        <br>Team Lead перевіряє, ставить оцінки й фідбек.
      </div>
    </div>
  </div>

  <div id="appScreen" class="app hidden"></div>

  <script>
    const STORAGE_KEY = "cabinet32_luxury_data_v4";

    const users = {
      admin: { password: "admin123", role: "admin", displayName: "Team Lead" },
      den_day: { password: "1111", role: "operator", displayName: "Денчик" },
      erik_evening: { password: "1111", role: "operator", displayName: "Ерік" },
      den_night: { password: "1111", role: "operator", displayName: "Денчік" }
    };

    let adminTab = "dashboard";

    function createId() {
      return Math.random().toString(36).slice(2, 10);
    }

    const defaultData = {
      operators: {
        den_day: {
          name: "Денчик",
          shift: "Дневнік",
          norm: 110,
          status: "Online",
          stats: { requests: 0, revenue: 0, fineDollars: 0 },
          strengths: [],
          improvements: [],
          weeklyPlan: [],
          weekScore: 0,
          reports: [],
          ryuTu: []
        },
        erik_evening: {
          name: "Ерік",
          shift: "Вечірнік",
          norm: 170,
          status: "Online",
          stats: { requests: 0, revenue: 0, fineDollars: 0 },
          strengths: [],
          improvements: [],
          weeklyPlan: [],
          weekScore: 0,
          reports: [],
          ryuTu: []
        },
        den_night: {
          name: "Денчік",
          shift: "Ночнік",
          norm: 170,
          status: "Online",
          stats: { requests: 0, revenue: 0, fineDollars: 0 },
          strengths: [],
          improvements: [],
          weeklyPlan: [],
          weekScore: 0,
          reports: [],
          ryuTu: []
        }
      },
      examples: []
    };

    let state = loadData();
    let currentUser = null;

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          return JSON.parse(raw);
        } catch (e) {
          return JSON.parse(JSON.stringify(defaultData));
        }
      }
      return JSON.parse(JSON.stringify(defaultData));
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(n){
      return "$" + Number(n || 0).toLocaleString("en-US");
    }

    function avg(arr){
      if (!arr.length) return 0;
      return arr.reduce((a,b)=>a+b,0) / arr.length;
    }

    function reviewedAvg(items){
      const filtered = items.filter(i => i.reviewed);
      return filtered.length ? avg(filtered.map(i => Number(i.score || 0))) : 0;
    }

    function getRyuTuStats(op){
      const items = op.ryuTu || [];
      const totalRyu = items.reduce((s, i) => s + Number(i.ryu || 0), 0);
      const totalTu = items.reduce((s, i) => s + Number(i.tu || 0), 0);
      const avgBalance = items.length ? items.reduce((s, i) => s + Number(i.balance || 0), 0) / items.length : 0;
      const avgScore = reviewedAvg(items);
      return { totalRyu, totalTu, avgBalance, avgScore };
    }

    function getOperatorScore(op){
      const rt = getRyuTuStats(op);
      const reportAvg = reviewedAvg(op.reports);
      const weekScore = Number(op.weekScore || 0);
      const normPercent = op.norm ? (Number(op.stats.revenue || 0) / Number(op.norm || 1)) * 100 : 0;
      const finePenalty = Number(op.stats.fineDollars || 0) * 1.5;
      const improvePenalty = (op.improvements || []).length * 6;

      return Math.round(
        Number(op.stats.revenue || 0) * 0.7 +
        normPercent * 2 +
        reportAvg * 10 +
        rt.avgScore * 10 +
        weekScore * 10 -
        finePenalty -
        improvePenalty
      );
    }

    function getRankedOperators() {
      const list = Object.entries(state.operators).map(([key, op]) => ({
        key,
        ...op,
        score: getOperatorScore(op)
      }));
      list.sort((a,b)=>b.score-a.score);
      return list;
    }

    function login() {
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("loginMessage");

      if (!users[username] || users[username].password !== password) {
        message.textContent = "Невірний логін або пароль";
        return;
      }

      currentUser = {
        username,
        role: users[username].role,
        displayName: users[username].displayName
      };

      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.title = `Cabinet 32 | ${currentUser.displayName}`;
      renderApp();
    }

    function logout() {
      currentUser = null;
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("loginMessage").textContent = "";
      document.getElementById("password").value = "";
      document.title = "Cabinet 32 | Team Lead Panel";
    }

    function setAdminTab(tab){
      adminTab = tab;
      renderApp();
    }

    function renderShell(content) {
      return `
        <div class="topbar">
          <div class="brand-wrap">
           <div class="brand-icon glow-logo">TLOD 32</div>
            <div>
              <div class="brand-title">CABINET 32</div>
              <div class="brand-sub">Luxury Team Control System</div>
            </div>
          </div>

          <div class="topbar-right">
            <div class="user-chip">${escapeHtml(currentUser.displayName)}</div>
            <button class="btn secondary small" onclick="logout()">Вийти</button>
          </div>
        </div>
        ${content}
      `;
    }

    function renderApp() {
      const app = document.getElementById("appScreen");
      if (!currentUser) return;

      if (currentUser.role === "admin") {
        app.innerHTML = renderAdminDashboard();
      } else {
        app.innerHTML = renderOperatorDashboard(currentUser.username);
      }
    }

    function renderAdminDashboard() {
      const ranked = getRankedOperators();
      const totalRevenue = Object.values(state.operators).reduce((s,o)=>s+Number(o.stats.revenue||0),0);
      const totalFines = Object.values(state.operators).reduce((s,o)=>s+Number(o.stats.fineDollars||0),0);
      const totalReports = Object.values(state.operators).reduce((s,o)=>s+o.reports.length,0);
      const totalRT = Object.values(state.operators).reduce((s,o)=>s+o.ryuTu.length,0);

      return renderShell(`
        <div class="bonus-banner">
          <strong>Бонус за 1 місце:</strong> поки в тесті
        </div>

        <div class="tabs">
          <button class="tab-btn ${adminTab==="dashboard" ? "active" : ""}" onclick="setAdminTab('dashboard')">Головна</button>
          <button class="tab-btn ${adminTab==="reports" ? "active" : ""}" onclick="setAdminTab('reports')">Звіти</button>
          <button class="tab-btn ${adminTab==="ryutu" ? "active" : ""}" onclick="setAdminTab('ryutu')">РЮ / ТЮ</button>
          <button class="tab-btn ${adminTab==="balance" ? "active" : ""}" onclick="setAdminTab('balance')">Звіт балансів</button>
          <button class="tab-btn ${adminTab==="points" ? "active" : ""}" onclick="setAdminTab('points')">Звіт балів</button>
          <button class="tab-btn ${adminTab==="improve" ? "active" : ""}" onclick="setAdminTab('improve')">Покращити</button>
          <button class="tab-btn ${adminTab==="strengths" ? "active" : ""}" onclick="setAdminTab('strengths')">Позитивні</button>
          <button class="tab-btn ${adminTab==="week" ? "active" : ""}" onclick="setAdminTab('week')">План тижня</button>
          <button class="tab-btn ${adminTab==="weekscore" ? "active" : ""}" onclick="setAdminTab('weekscore')">Оцінка тижня</button>
          <button class="tab-btn ${adminTab==="examples" ? "active" : ""}" onclick="setAdminTab('examples')">Приклади / скріни</button>
          <button class="tab-btn ${adminTab==="rating" ? "active" : ""}" onclick="setAdminTab('rating')">Рейтинг</button>
        </div>

        ${
          adminTab==="dashboard" ? `
          <div class="dashboard-grid">
            <div class="card stat-card">
              <div class="stat-label">Зроблено</div>
              <div class="stat-value">${money(totalRevenue)}</div>
              <div class="stat-sub">Сумарний результат</div>
            </div>

            <div class="card stat-card">
              <div class="stat-label">Штрафи</div>
              <div class="stat-value">${money(totalFines)}</div>
              <div class="stat-sub">У доларах</div>
            </div>

            <div class="card stat-card">
              <div class="stat-label">Звіти</div>
              <div class="stat-value">${totalReports}</div>
              <div class="stat-sub">Всього подано</div>
            </div>

            <div class="card stat-card">
              <div class="stat-label">РЮ / ТЮ</div>
              <div class="stat-value">${totalRT}</div>
              <div class="stat-sub">Всього записів</div>
            </div>

            <div class="card full">
              <h2>Оператори</h2>
              <div class="operators-grid">
                ${ranked.map(op => {
                  const rt = getRyuTuStats(op);
                  const normPercent = op.norm ? Math.round((Number(op.stats.revenue||0) / Number(op.norm)) * 100) : 0;
                  return `
                    <div class="operator-card">
                      <div class="operator-head">
                        <div>
                          <div class="operator-name">${escapeHtml(op.name)}</div>
                          <div class="entry-meta" style="margin-top:4px;">${escapeHtml(op.shift)}</div>
                        </div>
                        <div class="status">Score ${op.score}</div>
                      </div>

                      <div class="mini-stats">
                        <div class="mini">
                          <div class="label">Норма</div>
                          <div class="value">${money(op.norm)}</div>
                        </div>
                        <div class="mini">
                          <div class="label">Зроблено</div>
                          <div class="value">${money(op.stats.revenue)}</div>
                        </div>
                        <div class="mini">
                          <div class="label">Закриття</div>
                          <div class="value">${normPercent}%</div>
                        </div>
                        <div class="mini">
                          <div class="label">Штраф</div>
                          <div class="value">${money(op.stats.fineDollars)}</div>
                        </div>
                        <div class="mini">
                          <div class="label">РЮ</div>
                          <div class="value">${rt.totalRyu}</div>
                        </div>
                        <div class="mini">
                          <div class="label">ТЮ</div>
                          <div class="value">${rt.totalTu}</div>
                        </div>
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          </div>` : ""
        }

        ${
          adminTab==="reports" ? renderAdminReports() : ""
        }

        ${
          adminTab==="ryutu" ? renderAdminRyuTu() : ""
        }

        ${
          adminTab==="balance" ? renderBalanceReport() : ""
        }

        ${
          adminTab==="points" ? renderPointsReport() : ""
        }

        ${
          adminTab==="improve" ? renderImproveTab() : ""
        }

        ${
          adminTab==="strengths" ? renderStrengthsTab() : ""
        }

        ${
          adminTab==="week" ? renderWeekPlanTab() : ""
        }

        ${
          adminTab==="weekscore" ? renderWeekScoreTab() : ""
        }

        ${
          adminTab==="examples" ? renderExamplesTab() : ""
        }

        ${
          adminTab==="rating" ? renderRatingTab() : ""
        }
      `);
    }

    function renderAdminReports(){
      let all = [];
      Object.entries(state.operators).forEach(([key, op]) => {
        op.reports.forEach(item => all.push({...item, operatorKey:key, operatorName:op.name, shift:op.shift}));
      });
      all.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

      return `
        <div class="dashboard-grid">
          <div class="card full">
            <h2>Звіти операторів</h2>
            <div class="entry-list">
              ${all.length ? all.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title">
                      <span class="exclamation">!</span>${escapeHtml(item.operatorName)} — ${escapeHtml(item.title)}
                    </div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      <span class="tag ${item.reviewed ? 'blue' : 'red'}">
                        ${item.reviewed ? `Оцінка: ${Number(item.score||0)}/10` : 'Не перевірено'}
                      </span>
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  <div class="entry-text">${escapeHtml(item.text || "")}</div>

                  ${item.reviewed ? `
                    <div class="entry-meta" style="margin-top:10px;">Фідбек: ${escapeHtml(item.feedback || "—")}</div>
                  ` : `
                    <div class="actions">
                      <input id="reportScore_${item.id}" class="input" type="number" min="0" max="10" placeholder="Оцінка 0-10" style="max-width:180px; margin-bottom:0;">
                      <input id="reportFeedback_${item.id}" class="input" placeholder="Фідбек" style="margin-bottom:0; flex:1;">
                      <button class="btn small" onclick="reviewReport('${item.operatorKey}','${item.id}')">Зберегти оцінку</button>
                    </div>
                  `}
                </div>
              `).join("") : `<div class="empty">Поки звітів немає.</div>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderAdminRyuTu(){
      let all = [];
      Object.entries(state.operators).forEach(([key, op]) => {
        op.ryuTu.forEach(item => all.push({...item, operatorKey:key, operatorName:op.name, shift:op.shift}));
      });
      all.sort((a,b)=>String(b.date).localeCompare(String(a.date)));

      return `
        <div class="dashboard-grid">
          <div class="card full">
            <h2>РЮ / ТЮ від операторів</h2>
            <div class="entry-list">
              ${all.length ? all.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title">${escapeHtml(item.operatorName)} — РЮ: ${item.ryu}, ТЮ: ${item.tu}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      <span class="tag ${item.reviewed ? 'green' : 'red'}">
                        ${item.reviewed ? `Оцінка: ${Number(item.score||0)}/10` : 'Не перевірено'}
                      </span>
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  <div class="entry-text">Середній баланс: ${money(item.balance)}</div>
                  ${item.reviewed ? `
                    <div class="entry-meta" style="margin-top:10px;">Фідбек: ${escapeHtml(item.feedback || "—")}</div>
                  ` : `
                    <div class="actions">
                      <input id="rtScore_${item.id}" class="input" type="number" min="0" max="10" placeholder="Оцінка 0-10" style="max-width:180px; margin-bottom:0;">
                      <input id="rtFeedback_${item.id}" class="input" placeholder="Фідбек / проблема" style="margin-bottom:0; flex:1;">
                      <button class="btn small" onclick="reviewRyuTu('${item.operatorKey}','${item.id}')">Зберегти оцінку</button>
                    </div>
                  `}
                </div>
              `).join("") : `<div class="empty">Поки записів РЮ / ТЮ немає.</div>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderBalanceReport(){
      return `
        <div class="dashboard-grid">
          <div class="card full">
            <h2>Звіт балансів</h2>
            <div class="rating-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Оператор</th>
                    <th>Зміна</th>
                    <th>Норма</th>
                    <th>Зроблено</th>
                    <th>Закриття норми</th>
                    <th>Середній баланс</th>
                  </tr>
                </thead>
                <tbody>
                  ${Object.values(state.operators).map(op => {
                    const rt = getRyuTuStats(op);
                    const percent = op.norm ? Math.round((Number(op.stats.revenue||0)/Number(op.norm))*100) : 0;
                    return `
                      <tr>
                        <td>${escapeHtml(op.name)}</td>
                        <td>${escapeHtml(op.shift)}</td>
                        <td>${money(op.norm)}</td>
                        <td>${money(op.stats.revenue)}</td>
                        <td>${percent}%</td>
                        <td>${money(rt.avgBalance.toFixed(0))}</td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function renderPointsReport(){
      return `
        <div class="dashboard-grid">
          <div class="card full">
            <h2>Звіт балів</h2>
            <div class="rating-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Оператор</th>
                    <th>Оцінка звітів</th>
                    <th>Оцінка РЮ / ТЮ</th>
                    <th>Оцінка тижня</th>
                    <th>Штраф</th>
                    <th>Фінальний score</th>
                  </tr>
                </thead>
                <tbody>
                  ${Object.values(state.operators).map(op => {
                    const rt = getRyuTuStats(op);
                    return `
                      <tr>
                        <td>${escapeHtml(op.name)}</td>
                        <td>${reviewedAvg(op.reports).toFixed(1)}</td>
                        <td>${rt.avgScore.toFixed(1)}</td>
                        <td>${Number(op.weekScore || 0).toFixed(1)}</td>
                        <td>${money(op.stats.fineDollars)}</td>
                        <td>${getOperatorScore(op)}</td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function renderImproveTab(){
      return `
        <div class="dashboard-grid">
          <div class="card side">
            <h2>Що покращити</h2>
            <select id="improveOperator" class="select">
              <option value="den_day">Денчик — дневнік</option>
              <option value="erik_evening">Ерік — вечірнік</option>
              <option value="den_night">Денчік — ночнік</option>
            </select>
            <input id="improveTitle" class="input" placeholder="Короткий заголовок">
            <textarea id="improveText" class="input" placeholder="Що покращити"></textarea>
            <button class="btn red" onclick="addImprove()">Зберегти</button>
          </div>

          <div class="card wide">
            <h2>Покращення для операторів</h2>
            <div class="entry-list">
              ${Object.entries(state.operators).flatMap(([key,op]) =>
                op.improvements.map(item => `
                  <div class="entry">
                    <div class="entry-top">
                      <div class="entry-title">${escapeHtml(op.name)} — ${escapeHtml(item.title)}</div>
                      <span class="tag red">Покращити</span>
                    </div>
                    <div class="entry-text">${escapeHtml(item.text)}</div>
                  </div>
                `)
              ).join("") || `<div class="empty">Поки записів немає.</div>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderStrengthsTab(){
      return `
        <div class="dashboard-grid">
          <div class="card side">
            <h2>Позитивна якість</h2>
            <select id="strengthOperator" class="select">
              <option value="den_day">Денчик — дневнік</option>
              <option value="erik_evening">Ерік — вечірнік</option>
              <option value="den_night">Денчік — ночнік</option>
            </select>
            <input id="strengthText" class="input" placeholder="Напиши сильну сторону">
            <button class="btn" onclick="addStrength()">Зберегти</button>
          </div>

          <div class="card wide">
            <h2>Позитивні якості</h2>
            <div class="operators-grid">
              ${Object.values(state.operators).map(op => `
                <div class="operator-card">
                  <div class="operator-name" style="margin-bottom:12px;">${escapeHtml(op.name)}</div>
                  <div class="list-simple">
                    ${op.strengths.length ? op.strengths.map(item => `<div class="list-item">${escapeHtml(item)}</div>`).join("") : `<div class="empty">Поки пусто</div>`}
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;

    function renderExamplesTab(){

    function renderRatingTab(){
      const ranked = getRankedOperators();
      return `
        <div class="dashboard-grid">
          <div class="card full">
            <h2>Рейтинг операторів</h2>
            <div class="rating-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Місце</th>
                    <th>Оператор</th>
                    <th>Зміна</th>
                    <th>Зроблено</th>
                    <th>РЮ</th>
                    <th>ТЮ</th>
                    <th>Оцінка звітів</th>
                    <th>Оцінка РЮ/ТЮ</th>
                    <th>Оцінка тижня</th>
                    <th>Штраф</th>
                    <th>Score</th>
                  </tr>
                </thead>
                <tbody>
                  ${ranked.map((op, idx) => {
                    const rt = getRyuTuStats(op);
                    return `
                      <tr>
                        <td class="rank-num">#${idx + 1}</td>
                        <td>${escapeHtml(op.name)}</td>
                        <td>${escapeHtml(op.shift)}</td>
                        <td>${money(op.stats.revenue)}</td>
                        <td>${rt.totalRyu}</td>
                        <td>${rt.totalTu}</td>
                        <td>${reviewedAvg(op.reports).toFixed(1)}</td>
                        <td>${rt.avgScore.toFixed(1)}</td>
                        <td>${Number(op.weekScore||0).toFixed(1)}</td>
                        <td>${money(op.stats.fineDollars)}</td>
                        <td>${op.score}</td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function renderOperatorDashboard(username) {
      const op = state.operators[username];
      const rt = getRyuTuStats(op);
      const reportAvg = reviewedAvg(op.reports);
      const normPercent = op.norm ? Math.round((Number(op.stats.revenue || 0) / Number(op.norm || 1)) * 100) : 0;
      const ranked = getRankedOperators();

      return renderShell(`
        <div class="bonus-banner">
          <strong>Бонус за 1 місце:</strong> поки в тесті
        </div>

        <div class="operator-dashboard">
          <div class="card operator-main">
            <div class="profile-hero">
              <div>
                <div class="profile-name">${escapeHtml(op.name)}</div>
                <div class="profile-role">${escapeHtml(op.shift)} • Cabinet 32</div>
              </div>
              <div class="status">Score ${getOperatorScore(op)}</div>
            </div>

            <div class="mini-stats">
              <div class="mini">
                <div class="label">Норма</div>
                <div class="value">${money(op.norm)}</div>
              </div>
              <div class="mini">
                <div class="label">Зроблено</div>
                <div class="value">${money(op.stats.revenue)}</div>
              </div>
              <div class="mini">
                <div class="label">Закриття норми</div>
                <div class="value">${normPercent}%</div>
              </div>
              <div class="mini">
                <div class="label">Штраф</div>
                <div class="value">${money(op.stats.fineDollars)}</div>
              </div>
              <div class="mini">
                <div class="label">РЮ</div>
                <div class="value">${rt.totalRyu}</div>
              </div>
              <div class="mini">
                <div class="label">ТЮ</div>
                <div class="value">${rt.totalTu}</div>
              </div>
              <div class="mini">
                <div class="label">Оцінка звітів</div>
                <div class="value">${reportAvg.toFixed(1)}</div>
              </div>
              <div class="mini">
                <div class="label">Оцінка РЮ / ТЮ</div>
                <div class="value">${rt.avgScore.toFixed(1)}</div>
              </div>
            </div>
          </div>

          <div class="card operator-side">
            <h3>Моя оцінка тижня</h3>
            <div class="score-big">${Number(op.weekScore || 0)}/10</div>
            <div class="help" style="margin-top:14px;">Оцінку виставляє Team Lead.</div>
          </div>

          <div class="card operator-main">
            <h3>Подати РЮ / ТЮ</h3>
            <input id="operatorRyu" class="input" type="number" min="0" placeholder="РЮ">
            <input id="operatorTu" class="input" type="number" min="0" placeholder="ТЮ">
            <input id="operatorBalance" class="input" type="number" min="0" placeholder="Середній баланс">
            <button class="btn" onclick="operatorSubmitRyuTu()">Надіслати РЮ / ТЮ</button>

            <div class="entry-list">
              ${op.ryuTu.length ? op.ryuTu.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title">РЮ: ${item.ryu} • ТЮ: ${item.tu}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      <span class="tag ${item.reviewed ? 'green' : 'red'}">
                        ${item.reviewed ? `Оцінка: ${Number(item.score||0)}/10` : 'Очікує перевірки'}
                      </span>
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  <div class="entry-text">Середній баланс: ${money(item.balance)}</div>
                  ${item.reviewed ? `<div class="entry-meta" style="margin-top:10px;">Фідбек: ${escapeHtml(item.feedback || "—")}</div>` : ""}
                </div>
              `).join("") : `<div class="empty">Поки записів РЮ / ТЮ немає.</div>`}
            </div>
          </div>

          <div class="card operator-side">
            <h3>Рейтинг 3 операторів</h3>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Оператор</th>
                  <th>Score</th>
                </tr>
              </thead>
              <tbody>
                ${ranked.map((item, idx) => `
                  <tr>
                    <td class="rank-num">#${idx+1}</td>
                    <td>${escapeHtml(item.name)}</td>
                    <td>${item.score}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>

          <div class="card operator-main">
            <h3>Подати звіт</h3>
            <input id="operatorReportTitle" class="input" placeholder="Назва звіту">
            <textarea id="operatorReportText" class="input" placeholder="Напиши свій звіт"></textarea>
            <button class="btn" onclick="operatorSubmitReport()">Надіслати звіт</button>

            <div class="entry-list">
              ${op.reports.length ? op.reports.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title"><span class="exclamation">!</span>${escapeHtml(item.title)}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      <span class="tag ${item.reviewed ? 'blue' : 'red'}">
                        ${item.reviewed ? `Оцінка: ${Number(item.score||0)}/10` : 'Очікує перевірки'}
                      </span>
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  <div class="entry-text">${escapeHtml(item.text || "")}</div>
                  ${item.reviewed ? `<div class="entry-meta" style="margin-top:10px;">Фідбек: ${escapeHtml(item.feedback || "—")}</div>` : ""}
                </div>
              `).join("") : `<div class="empty">Поки звітів немає.</div>`}
            </div>
          </div>

          <div class="card operator-side">
            <h3>Що покращити</h3>
            <div class="list-simple">
              ${op.improvements.length ? op.improvements.map(item => `<div class="list-item"><strong>${escapeHtml(item.title)}</strong><br>${escapeHtml(item.text)}</div>`).join("") : `<div class="empty">Поки пусто</div>`}
            </div>
          </div>

          <div class="card operator-side">
            <h3>Позитивні якості</h3>
            <div class="list-simple">
              ${op.strengths.length ? op.strengths.map(item => `<div class="list-item">${escapeHtml(item)}</div>`).join("") : `<div class="empty">Поки пусто</div>`}
            </div>
          </div>

          <div class="card operator-main">
            <h3>План на тиждень</h3>
            <div class="list-simple">
              ${op.weeklyPlan.length ? op.weeklyPlan.map(item => `<div class="list-item">${escapeHtml(item)}</div>`).join("") : `<div class="empty">План ще не доданий</div>`}
            </div>
          </div>

          <div class="card operator-main">
            <h3>Приклади / як добре заведений РЮ</h3>
            <div class="entry-list">
              ${state.examples.length ? state.examples.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title">${escapeHtml(item.title)}</div>
                    <div class="entry-meta">${escapeHtml(item.date)}</div>
                  </div>
                  <div class="entry-text">${escapeHtml(item.text || "")}</div>
                  ${item.url ? `<img class="image-preview" src="${escapeHtml(item.url)}" alt="example">` : ""}
                </div>
              `).join("") : `<div class="empty">Поки прикладів немає.</div>`}
            </div>
          </div>
        </div>
      `);
    }

    function operatorSubmitRyuTu(){
      const op = state.operators[currentUser.username];
      const ryu = Number(document.getElementById("operatorRyu").value || 0);
      const tu = Number(document.getElementById("operatorTu").value || 0);
      const balance = Number(document.getElementById("operatorBalance").value || 0);

      op.ryuTu.unshift({
        id:createId(),
        date:new Date().toISOString().slice(0,10),
        ryu,
        tu,
        balance,
        reviewed:false,
        score:0,
        feedback:""
      });

      saveData();
      renderApp();
    }

    function operatorSubmitReport(){
      const op = state.operators[currentUser.username];
      const title = document.getElementById("operatorReportTitle").value.trim();
      const text = document.getElementById("operatorReportText").value.trim();

      if (!title) {
        alert("Введи назву звіту");
        return;
      }

      op.reports.unshift({
        id:createId(),
        date:new Date().toISOString().slice(0,10),
        title,
        text,
        reviewed:false,
        score:0,
        feedback:""
      });

      saveData();
      renderApp();
    }

    function reviewReport(operatorKey, reportId){
      const score = Number(document.getElementById(`reportScore_${reportId}`).value || 0);
      const feedback = document.getElementById(`reportFeedback_${reportId}`).value.trim();

      const report = state.operators[operatorKey].reports.find(r => r.id === reportId);
      if (!report) return;

      report.reviewed = true;
      report.score = score;
      report.feedback = feedback;

      saveData();
      renderApp();
    }

    function reviewRyuTu(operatorKey, itemId){
      const score = Number(document.getElementById(`rtScore_${itemId}`).value || 0);
      const feedback = document.getElementById(`rtFeedback_${itemId}`).value.trim();

      const item = state.operators[operatorKey].ryuTu.find(r => r.id === itemId);
      if (!item) return;

      item.reviewed = true;
      item.score = score;
      item.feedback = feedback;

      saveData();
      renderApp();
    }

    function addImprove(){
      const operator = document.getElementById("improveOperator").value;
      const title = document.getElementById("improveTitle").value.trim();
      const text = document.getElementById("improveText").value.trim();

      if (!title || !text) {
        alert("Заповни заголовок і текст");
        return;
      }

      state.operators[operator].improvements.unshift({
        id:createId(),
        date:new Date().toISOString().slice(0,10),
        title,
        text
      });

      saveData();
      renderApp();
    }

    function addStrength(){
      const operator = document.getElementById("strengthOperator").value;
      const text = document.getElementById("strengthText").value.trim();

      if (!text) {
        alert("Напиши сильну сторону");
        return;
      }

      state.operators[operator].strengths.unshift(text);
      saveData();
      renderApp();
    }

    function addWeekPlan(){
      const operator = document.getElementById("weekOperator").value;
      const text = document.getElementById("weekText").value.trim();

      if (!text) {
        alert("Напиши пункт плану");
        return;
      }

      state.operators[operator].weeklyPlan.unshift(text);
      saveData();
      renderApp();
    }

    function setWeekScore(){
      const operator = document.getElementById("weekScoreOperator").value;
      const value = Number(document.getElementById("weekScoreValue").value || 0);
      state.operators[operator].weekScore = value;
      saveData();
      renderApp();
    }

    function addExample(){
      const title = document.getElementById("exampleTitle").value.trim();
      const url = document.getElementById("exampleUrl").value.trim();
      const text = document.getElementById("exampleText").value.trim();

      if (!title) {
        alert("Напиши назву прикладу");
        return;
      }

      state.examples.unshift({
        id:createId(),
        date:new Date().toISOString().slice(0,10),
        title,
        url,
        text
      });

      saveData();
      renderApp();
    }
  </script>
