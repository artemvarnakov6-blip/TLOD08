<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLOD 32</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
color:gold;
font-size:40px;
text-shadow:0 0 10px gold,0 0 20px gold;
}

input{
padding:10px;
margin:10px;
width:250px;
border-radius:10px;
border:none;
}

button{
padding:12px 20px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
margin:20px auto;
width:350px;
}

</style>

</head>

<body>

<h1>TLOD 32</h1>

<div id="loginBox">

<input id="email" placeholder="Email">
<br>
<input id="password" type="password" placeholder="Password">
<br>

<button onclick="login()">Login</button>

</div>

<div id="panel" style="display:none">

<h2 id="welcome"></h2>

<div class="card">
<h3>Ryu</h3>
<input id="ryu">
</div>

<div class="card">
<h3>Tu</h3>
<input id="tu">
</div>

<button onclick="sendData()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD6WfRk1bElkX0s9qqqkv55qmq2SthZa3g",
authDomain: "tlod-32.firebaseapp.com",
projectId: "tlod-32",
storageBucket: "tlod-32.firebasestorage.app",
messagingSenderId: "775385357522",
appId: "1:775385357522:web:81a320d958be47a943e10b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

document.getElementById("welcome").innerText="Привіт "+email

})

.catch(()=>{
alert("Login error")
})

}

window.sendData = async function(){

let ryu=document.getElementById("ryu").value
let tu=document.getElementById("tu").value

await addDoc(collection(db,"ryutu"),{

ryu:ryu,
tu:tu,
date:new Date().toISOString()

})

alert("Saved")

}

</script>

</body>
</html>
