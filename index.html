<!DOCTYPE html>
<html lang="uk">
<head>

    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="%23fff0a6"/>
        <stop offset="45%" stop-color="%23ffd700"/>
        <stop offset="100%" stop-color="%23b8860b"/>
      </linearGradient>
    </defs>
    <rect width="64" height="64" rx="14" fill="%23070707"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    :root{
      --gold:#ffd700;
      --gold-soft:#d4af37;
      --bg:#050505;
      --card:#111111;
      --card2:#171717;
      --text:#ffffff;
      --muted:#cbbd88;
      --danger:#ff7b7b;
      --success:#8ff0a4;
      --blue:#9dc7ff;
      --border:rgba(255,215,0,.20);
      --shadow:0 0 30px rgba(255,215,0,.08);
    }

    body{
      background:
        radial-gradient(circle at top, rgba(255,215,0,.07), transparent 28%),
        linear-gradient(135deg,#000000,#090909 45%,#000000 100%);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      width:900px;
      height:900px;
      left:-240px;
      top:-300px;
      background:radial-gradient(circle, rgba(255,215,0,.10), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      animation:floatGlow1 14s ease-in-out infinite alternate;
    }

    body::after{
      content:"";
      position:fixed;
      width:800px;
      height:800px;
      right:-240px;
      bottom:-280px;
      background:radial-gradient(circle, rgba(212,175,55,.08), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      animation:floatGlow2 16s ease-in-out infinite alternate;
    }

    @keyframes floatGlow1{
      from{transform:translate(0,0);}
      to{transform:translate(140px,100px);}
    }

    @keyframes floatGlow2{
      from{transform:translate(0,0);}
      to{transform:translate(-140px,-100px);}
    }

    .particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 35% 70%, rgba(255,215,0,.08) 0 2px, transparent 3px),
        radial-gradient(circle at 50% 35%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 75% 25%, rgba(255,215,0,.12) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 70%, rgba(255,215,0,.09) 0 2px, transparent 3px);
      opacity:.7;
      animation:particlesMove 12s ease-in-out infinite alternate;
      z-index:0;
    }

    @keyframes particlesMove{
      from{transform:translateY(0);}
      to{transform:translateY(-16px);}
    }

    .trophies{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .trophy{
      position:absolute;
      color:rgba(255,215,0,.08);
      text-shadow:0 0 22px rgba(255,215,0,.08);
      user-select:none;
      animation:floatCup 8s ease-in-out infinite alternate;
      transform-origin:center;
    }

    .trophy.t1{top:7%; left:5%; font-size:76px; animation-duration:9s;}
    .trophy.t2{top:15%; right:8%; font-size:58px; animation-duration:11s;}
    .trophy.t3{bottom:10%; left:9%; font-size:68px; animation-duration:10s;}
    .trophy.t4{bottom:14%; right:11%; font-size:62px; animation-duration:12s;}
    .trophy.t5{top:42%; left:2%; font-size:44px; animation-duration:13s;}
    .trophy.t6{top:54%; right:3%; font-size:48px; animation-duration:14s;}
    .trophy.t7{top:69%; left:28%; font-size:36px; animation-duration:10s;}
    .trophy.t8{top:27%; right:30%; font-size:42px; animation-duration:12s;}
    .trophy.t9{top:33%; left:45%; font-size:34px; animation-duration:8s;}
    .trophy.t10{bottom:32%; right:43%; font-size:30px; animation-duration:9.5s;}

    @keyframes floatCup{
      0%{transform:translateY(0px) rotate(-2deg);}
      100%{transform:translateY(-16px) rotate(2deg);}
    }

    .corner{
      position:fixed;
      width:140px;
      height:140px;
      border:1px solid var(--border);
      z-index:1;
      pointer-events:none;
    }

    .top-left{top:24px;left:24px;border-right:none;border-bottom:none;}
    .top-right{top:24px;right:24px;border-left:none;border-bottom:none;}
    .bottom-left{bottom:24px;left:24px;border-right:none;border-top:none;}
    .bottom-right{bottom:24px;right:24px;border-left:none;border-top:none;}

    .hidden{display:none !important;}

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      z-index:2;
    }

    .login-box{
      width:440px;
      max-width:100%;
      background:linear-gradient(180deg, rgba(18,18,18,.96), rgba(6,6,6,.97));
      border:1px solid rgba(255,215,0,.28);
      border-radius:30px;
      padding:40px 30px;
      box-shadow:
        0 0 40px rgba(255,215,0,.10),
        inset 0 0 24px rgba(255,215,0,.04);
      text-align:center;
      animation:showUp .9s ease;
      position:relative;
      z-index:2;
      backdrop-filter:blur(10px);
    }

    @keyframes showUp{
      from{opacity:0; transform:translateY(16px);}
      to{opacity:1; transform:translateY(0);}
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border:1px solid rgba(255,215,0,.20);
      border-radius:999px;
      color:#f3de8f;
      background:rgba(255,215,0,.04);
      font-size:12px;
      letter-spacing:1px;
      margin-bottom:16px;
    }

    .gold-line{
      width:82px;
      height:3px;
      margin:0 auto 18px auto;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      box-shadow:0 0 16px rgba(255,215,0,.35);
    }

    h1{
      color:var(--gold);
      font-size:40px;
      letter-spacing:4px;
      text-shadow:0 0 12px rgba(255,215,0,.25);
      margin-bottom:10px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:2px;
      margin-bottom:24px;
    }

    .help{
      color:#9f9f9f;
      font-size:13px;
      line-height:1.6;
      margin-top:18px;
      text-align:left;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.05);
      border-radius:16px;
      padding:14px;
    }

    .input, .select{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(255,215,0,.18);
      background:#101010;
      color:white;
      outline:none;
      margin-bottom:14px;
      font-size:15px;
      transition:.2s;
    }

    .input:focus, .select:focus{
      border-color:var(--gold);
      box-shadow:0 0 14px rgba(255,215,0,.15);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#141414;
      font-weight:700;
      font-size:15px;
      letter-spacing:1px;
      transition:.2s;
      box-shadow:0 10px 25px rgba(255,215,0,.12);
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(255,215,0,.20);
    }

    .btn.secondary{
      background:transparent;
      color:var(--gold);
      border:1px solid rgba(255,215,0,.20);
      box-shadow:none;
    }

    .btn.small{
      width:auto;
      padding:10px 14px;
      font-size:13px;
      border-radius:12px;
    }

    .btn.red{
      background:linear-gradient(90deg,#6b1c1c,#ff7b7b,#b03030);
      color:#fff;
    }

    #loginMessage{
      min-height:22px;
      margin-top:12px;
      color:var(--danger);
      font-size:14px;
    }

    .app{
      min-height:100vh;
      padding:26px;
      position:relative;
      z-index:2;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:24px;
      padding:18px 20px;
      border:1px solid rgba(255,215,0,.14);
      background:rgba(12,12,12,.85);
      border-radius:22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      position:relative;
      z-index:2;
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .brand-icon{
      width:58px;
      height:58px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      border:1px solid rgba(255,215,0,.25);
      color:var(--gold);
      font-size:20px;
      font-weight:800;
      box-shadow:inset 0 0 14px rgba(255,215,0,.05);
    }

    .brand-title{
      font-size:24px;
      color:var(--gold);
      letter-spacing:2px;
      margin-bottom:4px;
    }

    .brand-sub{
      color:var(--muted);
      font-size:13px;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .user-chip{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,215,0,.16);
      color:#f0d983;
      background:rgba(255,215,0,.04);
      font-size:13px;
    }

    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
      position:relative;
      z-index:2;
    }

    .card{
      background:linear-gradient(180deg, rgba(18,18,18,.96), rgba(8,8,8,.96));
      border:1px solid rgba(255,215,0,.14);
      border-radius:24px;
      padding:20px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .card h2, .card h3{
      color:var(--gold);
      margin-bottom:14px;
      letter-spacing:1px;
    }

    .stat-card{grid-column:span 3; min-height:120px;}
    .wide{grid-column:span 8;}
    .side{grid-column:span 4;}
    .full{grid-column:span 12;}
    .operator-main{grid-column:span 8;}
    .operator-side{grid-column:span 4;}

    .stat-label{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:34px;
      color:#fff4c2;
      font-weight:800;
      margin-bottom:8px;
    }

    .stat-sub{
      color:#8e8e8e;
      font-size:13px;
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
      position:relative;
      z-index:2;
    }

    .tab-btn{
      border:1px solid rgba(255,215,0,.16);
      background:rgba(255,215,0,.04);
      color:#e7d084;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:13px;
      transition:.2s;
    }

    .tab-btn.active{
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#151515;
      font-weight:700;
    }

    .operators-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .operator-card{
      background:linear-gradient(180deg, rgba(24,24,24,.98), rgba(10,10,10,.96));
      border:1px solid rgba(255,215,0,.14);
      border-radius:20px;
      padding:18px;
      transition:.2s;
    }

    .operator-card:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 32px rgba(255,215,0,.08);
    }

    .operator-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .operator-name{
      font-size:22px;
      color:#ffe89a;
      font-weight:700;
    }

    .status{
      font-size:12px;
      border-radius:999px;
      padding:7px 10px;
      background:rgba(143,240,164,.08);
      color:var(--success);
      border:1px solid rgba(143,240,164,.18);
    }

    .mini-stats{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .mini{
      padding:12px;
      border-radius:16px;
      background:rgba(255,215,0,.04);
      border:1px solid rgba(255,215,0,.08);
    }

    .mini .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .mini .value{
      font-size:22px;
      color:#fff2b6;
      font-weight:700;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:12px;
    }

    textarea.input{
      min-height:100px;
      resize:vertical;
    }

    .entry-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:16px;
    }

    .entry{
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
    }

    .entry-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .entry-title{
      color:#ffe89a;
      font-weight:700;
    }

    .entry-meta{
      color:#9a9a9a;
      font-size:12px;
    }

    .entry-text{
      color:#d7d7d7;
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
    }

    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.8px;
      text-transform:uppercase;
      border:1px solid rgba(255,215,0,.14);
      background:rgba(255,215,0,.05);
      color:#f1d67d;
    }

    .tag.red{
      color:#ff9d9d;
      border-color:rgba(255,123,123,.16);
      background:rgba(255,123,123,.06);
    }

    .tag.green{
      color:#9ef0b0;
      border-color:rgba(143,240,164,.16);
      background:rgba(143,240,164,.06);
    }

    .tag.blue{
      color:#9dc7ff;
      border-color:rgba(125,180,255,.16);
      background:rgba(125,180,255,.06);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .empty{
      color:#8c8c8c;
      font-size:14px;
      padding:14px 0 4px 0;
    }

    .operator-dashboard{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
      position:relative;
      z-index:2;
    }

    .profile-hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .profile-name{
      font-size:30px;
      color:#ffe89a;
      margin-bottom:6px;
    }

    .profile-role{
      color:var(--muted);
      text-transform:uppercase;
      font-size:13px;
      letter-spacing:1px;
    }

    .note-box{
      padding:14px;
      border-radius:16px;
      background:rgba(255,215,0,.04);
      border:1px solid rgba(255,215,0,.08);
      color:#ddd;
      line-height:1.55;
      font-size:14px;
    }

    .list-simple{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
    }

    .list-item{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
      color:#ddd;
      font-size:14px;
      line-height:1.5;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
    }

    th, td{
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid rgba(255,215,0,.08);
      font-size:14px;
      vertical-align:top;
    }

    th{
      color:#f3db86;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1px;
      font-size:12px;
    }

    .rank-num{
      font-size:20px;
      font-weight:800;
      color:#fff1a8;
    }

    .bonus-banner{
      margin-bottom:18px;
      padding:16px 18px;
      border:1px solid rgba(255,215,0,.18);
      border-radius:18px;
      background:linear-gradient(90deg, rgba(255,215,0,.08), rgba(255,215,0,.03));
      color:#ffe89a;
      box-shadow:var(--shadow);
    }

    .exclamation{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:22px;
      height:22px;
      border-radius:999px;
      background:rgba(255,123,123,.15);
      color:#ff9d9d;
      font-weight:700;
      border:1px solid rgba(255,123,123,.22);
      margin-right:8px;
    }

    .score-big{
      font-size:28px;
      font-weight:800;
      color:#fff3bf;
    }

    .image-preview{
      width:100%;
      max-height:260px;
      object-fit:cover;
      border-radius:16px;
      border:1px solid rgba(255,215,0,.10);
      margin-top:10px;
    }

    .rating-table-wrap{
      overflow:auto;
    }

    @media (max-width: 1100px){
      .stat-card{grid-column:span 6;}
      .wide, .side, .operator-main, .operator-side{grid-column:span 12;}
      .operators-grid{grid-template-columns:1fr;}
    }

    @media (max-width: 720px){
      .app{padding:14px;}
      .topbar{padding:16px; border-radius:18px;}
      .dashboard-grid{gap:14px;}
      .stat-card{grid-column:span 12;}
      .form-grid, .mini-stats{grid-template-columns:1fr;}
      .profile-name{font-size:24px;}
      h1{font-size:34px;}
    }
  </style>
</head>

        }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          return JSON.parse(raw);
        } catch (e) {
          return JSON.parse(JSON.stringify(defaultData));
        }
      }
      return JSON.parse(JSON.stringify(defaultData));
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(n){
      return "$" + Number(n || 0).toLocaleString("en-US");
    }

    function avg(arr){
      if (!arr.length) return 0;
      return arr.reduce((a,b)=>a+b,0) / arr.length;
    }

    function getRyuTuStats(op){
      const items = op.ryuTu || [];
      const totalRyu = items.reduce((s, i) => s + Number(i.ryu || 0), 0);
      const totalTu = items.reduce((s, i) => s + Number(i.tu || 0), 0);
      const avgBalance = items.length ? items.reduce((s, i) => s + Number(i.balance || 0), 0) / items.length : 0;
      const avgScore = items.filter(i => i.reviewed).length
        ? avg(items.filter(i => i.reviewed).map(i => Number(i.score || 0)))
        : 0;
      return { totalRyu, totalTu, avgBalance, avgScore };
    }

    function getReportAvg(op){
      const reviewed = op.reports.filter(r => r.reviewed);
      return reviewed.length ? avg(reviewed.map(r => Number(r.score || 0))) : 0;
    }

    function getOperatorScore(op){
      const rt = getRyuTuStats(op);
      const reportAvg = getReportAvg(op);
      const normPercent = op.norm ? (Number(op.stats.revenue || 0) / Number(op.norm || 1)) * 100 : 0;
      const weekScore = Number(op.weekScore || 0);
      const finePenalty = Number(op.stats.fineDollars || 0) * 1.5;
      const improvePenalty = (op.improvements || []).length * 8;

      return Math.round(
        Number(op.stats.revenue || 0) * 0.7 +
        normPercent * 2 +
        reportAvg * 10 +
        rt.avgScore * 10 +
        weekScore * 10 -
        finePenalty -
        improvePenalty
      );
    }

    function getRankedOperators() {
      const list = Object.entries(state.operators).map(([key, op]) => ({
        key,
        ...op,
        score: getOperatorScore(op)
      }));
      list.sort((a,b)=>b.score-a.score);
      return list;
    }

    function login() {
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("loginMessage");

      if (!users[username] || users[username].password !== password) {
        message.textContent = "Невірний логін або пароль";
        return;
      }

      currentUser = {
        username,
        role: users[username].role,
        displayName: users[username].displayName
      };

      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.title = `Cabinet 32 | ${currentUser.displayName}`;
      renderApp();
    }

    function logout() {
      currentUser = null;
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("loginMessage").textContent = "";
      document.getElementById("password").value = "";
      document.title = "Cabinet 32 | Team Lead Panel";
    }

      const app = document.getElementById("appScreen");

      if (currentUser.role === "admin") {

      } else {
