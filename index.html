<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TLOD 32 | Luxury Firebase Panel</title>

  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="%23fff2a8"/>
        <stop offset="45%" stop-color="%23ffd700"/>
        <stop offset="100%" stop-color="%23b8860b"/>
      </linearGradient>
    </defs>
    <rect width="64" height="64" rx="14" fill="%23060606"/>
    <text x="32" y="42" text-anchor="middle" font-size="18" font-family="Arial" font-weight="700" fill="url(%23g)">32</text>
  </svg>'>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    :root{
      --gold:#ffd700;
      --gold2:#d4af37;
      --gold3:#fff0a6;
      --red:#ff5f5f;
      --red2:#ff2f2f;
      --green:#8ff0a4;
      --blue:#8ecbff;
      --text:#fff;
      --muted:#b8ab79;
      --bg:#040404;
      --card:rgba(18,18,18,.86);
      --card2:rgba(28,28,28,.92);
      --line:rgba(255,215,0,.14);
      --shadow:0 20px 60px rgba(0,0,0,.55);
    }
    *{
  text-shadow:0 0 2px rgba(255,215,0,.15);
}
    .card:hover{box-shadow:0 0 30px rgba(255,215,0,.2)}
    .btn:hover{
  filter:brightness(1.2) drop-shadow(0 0 10px rgba(255,215,0,.5));
}
    .stat-icon{
  width:18px;
  height:18px;
  margin-right:6px;

  stroke:white;
  stroke-width:2;

  filter:
    drop-shadow(0 0 3px rgba(255,255,255,1))
    drop-shadow(0 0 8px rgba(255,255,255,0.9))
    drop-shadow(0 0 14px rgba(255,255,255,0.8));

}

.mini .label{
  display:flex;
  align-items:center;
  gap:6px;
}

    html{scroll-behavior:smooth}

    body{
      min-height:100vh;
      overflow-x:hidden;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,215,0,.06), transparent 26%),
        linear-gradient(135deg,#000000,#080808 45%,#000000 100%);
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      width:950px;
      height:950px;
      left:-300px;
      top:-380px;
      background:radial-gradient(circle, rgba(255,215,0,.11), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      z-index:0;
      animation:glowMove1 15s ease-in-out infinite alternate;
    }

    body::after{
      content:"";
      position:fixed;
      width:850px;
      height:850px;
      right:-260px;
      bottom:-260px;
      background:radial-gradient(circle, rgba(255,0,0,.07), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      z-index:0;
      animation:glowMove2 17s ease-in-out infinite alternate;
    }

    @keyframes glowMove1{
      from{transform:translate(0,0)}
      to{transform:translate(150px,120px)}
    }
    @keyframes glowMove2{
      from{transform:translate(0,0)}
      to{transform:translate(-140px,-100px)}
    }

    .particles{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 10% 15%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 23% 84%, rgba(255,215,0,.07) 0 2px, transparent 3px),
        radial-gradient(circle at 34% 30%, rgba(255,215,0,.08) 0 2px, transparent 3px),
        radial-gradient(circle at 49% 58%, rgba(255,0,0,.08) 0 2px, transparent 3px),
        radial-gradient(circle at 66% 20%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 79% 70%, rgba(255,215,0,.09) 0 2px, transparent 3px),
        radial-gradient(circle at 92% 40%, rgba(255,0,0,.06) 0 2px, transparent 3px);
      animation:particleFloat 12s ease-in-out infinite alternate;
      opacity:.85;
    }

    @keyframes particleFloat{
      from{transform:translateY(0)}
      to{transform:translateY(-18px)}
    }

    .trophies{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }
    .trophy{
      position:absolute;
      color:rgba(255,215,0,.07);
      text-shadow:0 0 18px rgba(255,215,0,.08);
      user-select:none;
      animation:trophyFloat 8s ease-in-out infinite alternate;
    }
    .t1{top:6%;left:4%;font-size:84px;animation-duration:8s}
    .t2{top:14%;right:6%;font-size:60px;animation-duration:11s}
    .t3{bottom:9%;left:8%;font-size:74px;animation-duration:10s}
    .t4{bottom:14%;right:10%;font-size:62px;animation-duration:12s}
    .t5{top:40%;left:2%;font-size:42px;animation-duration:13s}
    .t6{top:52%;right:2%;font-size:48px;animation-duration:14s}
    .t7{top:70%;left:28%;font-size:38px;animation-duration:9s}
    .t8{top:26%;right:31%;font-size:42px;animation-duration:10s}
    .t9{top:30%;left:46%;font-size:34px;animation-duration:7s}
    .t10{bottom:30%;right:43%;font-size:32px;animation-duration:9s}

    @keyframes trophyFloat{
      0%{transform:translateY(0) rotate(-2deg) scale(1)}
      100%{transform:translateY(-18px) rotate(2deg) scale(1.04)}
    }

    .hidden{display:none!important}

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      z-index:2;
    }

    .login-box{
      width:480px;
      max-width:100%;
      background:linear-gradient(180deg, rgba(16,16,16,.95), rgba(6,6,6,.97));
      border:1px solid rgba(255,215,0,.22);
      border-radius:34px;
      padding:42px 32px;
      box-shadow:
        0 20px 80px rgba(0,0,0,.5),
        0 0 40px rgba(255,215,0,.08),
        inset 0 0 26px rgba(255,215,0,.04);
      backdrop-filter:blur(14px);
      text-align:center;
      animation:loginRise .8s ease;
    }

    @keyframes loginRise{
      from{opacity:0;transform:translateY(18px) scale(.98)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,215,0,.16);
      background:rgba(255,215,0,.04);
      color:#f7de89;
      letter-spacing:1px;
      font-size:12px;
      margin-bottom:16px;
      transition:.25s;
    }
    .badge:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(255,215,0,.1)}

    .gold-line{
      width:86px;
      height:3px;
      border-radius:999px;
      margin:0 auto 18px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      box-shadow:0 0 18px rgba(255,215,0,.4);
    }

    .main-logo,.brand-title{
      color:#ffd700;
      font-weight:900;
      text-shadow:
        0 0 8px rgba(255,215,0,.95),
        0 0 18px rgba(255,215,0,.65),
        0 0 40px rgba(255,215,0,.28);
      animation:logoPulse 3s ease-in-out infinite;
    }

    .main-logo{
      font-size:46px;
      letter-spacing:4px;
      margin-bottom:12px;
    }

    .brand-title{
      font-size:28px;
      letter-spacing:2px;
      margin-bottom:4px;
    }

    @keyframes logoPulse{
      0%,100%{
        text-shadow:
          0 0 8px rgba(255,215,0,.85),
          0 0 18px rgba(255,215,0,.62),
          0 0 34px rgba(255,215,0,.22);
        transform:scale(1);
      }
      50%{
        text-shadow:
          0 0 12px rgba(255,215,0,1),
          0 0 28px rgba(255,215,0,.84),
          0 0 60px rgba(255,215,0,.35);
        transform:scale(1.03);
      }
    }

    .subtitle,.brand-sub{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:2px;
    }

    .subtitle{font-size:14px;margin-bottom:24px}
    .brand-sub{font-size:12px;letter-spacing:1px}

    .help{
      margin-top:18px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.04);
      color:#9f9f9f;
      line-height:1.6;
      text-align:left;
      font-size:13px;
    }

    .input,.select,.textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,215,0,.12);
      background:rgba(10,10,10,.88);
      color:white;
      outline:none;
      font-size:15px;
      margin-bottom:14px;
      transition:.25s;
    }

    .textarea{min-height:110px;resize:vertical}

    .input:focus,.select:focus,.textarea:focus{
      border-color:var(--gold);
      box-shadow:0 0 16px rgba(255,215,0,.16);
      transform:translateY(-1px);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      font-size:15px;
      letter-spacing:1px;
      transition:.25s;
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#171717;
      box-shadow:0 12px 26px rgba(255,215,0,.14);
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.01);
      box-shadow:0 16px 34px rgba(255,215,0,.22);
    }

    .btn.secondary{
      background:transparent;
      color:var(--gold);
      border:1px solid rgba(255,215,0,.18);
      box-shadow:none;
    }

    .btn.secondary:hover{background:rgba(255,215,0,.04)}
    .btn.small{width:auto;padding:10px 14px;font-size:13px;border-radius:12px}
    .btn.red{
      background:linear-gradient(90deg,#550d0d,#ff4646,#902020);
      color:white;
      box-shadow:0 10px 24px rgba(255,0,0,.16);
    }
    .btn.red:hover{box-shadow:0 14px 30px rgba(255,0,0,.22)}

    .app{
      min-height:100vh;
      padding:26px;
      position:relative;
      z-index:2;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:24px;
      padding:18px 20px;
      border-radius:24px;
      border:1px solid rgba(255,215,0,.12);
      background:rgba(12,12,12,.74);
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }

    .brand-wrap{display:flex;align-items:center;gap:14px}
    .brand-badge{
  width:64px;
  height:64px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0d0d0d,#171717);
  border:1px solid rgba(255,215,0,.18);
  color:var(--gold);
  font-weight:800;
  font-size:20px;
  box-shadow:
    inset 0 0 14px rgba(255,215,0,.05),
    0 0 18px rgba(255,215,0,.05),
    0 0 14px rgba(255,255,255,.10);
  text-shadow:
    0 0 5px rgba(255,255,255,.65),
    0 0 12px rgba(255,255,255,.35),
    0 0 16px rgba(255,215,0,.25);
  transition:.25s;
}
    .brand-badge:hover{transform:translateY(-2px) scale(1.04)}

    .topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .user-chip{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,215,0,.16);
      background:rgba(255,215,0,.04);
      color:#f2d57d;
      font-size:13px;
    }

    .bonus-banner{
      margin-bottom:18px;
      padding:18px;
      border-radius:20px;
      border:1px solid rgba(255,215,0,.14);
      background:linear-gradient(90deg, rgba(255,215,0,.07), rgba(255,0,0,.04));
      color:#ffe89a;
      box-shadow:var(--shadow);
      animation:bannerPulse 3s infinite alternate;
      line-height:1.6;
    }

    @keyframes bannerPulse{
      from{box-shadow:0 10px 30px rgba(255,215,0,.05)}
      to{box-shadow:0 16px 36px rgba(255,0,0,.10)}
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .tab-btn{
      border:1px solid rgba(255,215,0,.14);
      background:rgba(255,215,0,.04);
      color:#e8d389;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:13px;
      transition:.25s;
    }

    .tab-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 22px rgba(255,215,0,.08);
    }

    .tab-btn.active{
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#111;
      font-weight:800;
    }

    .tab-btn.red-accent.active{
      background:linear-gradient(90deg,#651111,#ff4a4a,#aa1f1f);
      color:#fff;
      box-shadow:0 10px 24px rgba(255,0,0,.18);
    }

    .dashboard-grid,.operator-dashboard{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(18,18,18,.86), rgba(8,8,8,.94));
      border:1px solid rgba(255,215,0,.10);
      border-radius:24px;
      padding:20px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      transition:.25s;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.02) 30%, transparent 65%);
      transform:translateX(-100%);
      transition:1s;
    }

    .card:hover::before{transform:translateX(100%)}
    .card:hover{
      transform:translateY(-3px);
      border-color:rgba(255,215,0,.18);
      box-shadow:0 24px 50px rgba(0,0,0,.45),0 0 24px rgba(255,215,0,.08);
    }

    .card h2,.card h3{color:var(--gold);margin-bottom:14px;letter-spacing:1px}

    .stat-card{grid-column:span 3;min-height:132px}
    .wide{grid-column:span 8}
    .side{grid-column:span 4}
    .full{grid-column:span 12}
    .operator-main{grid-column:span 8}
    .operator-side{grid-column:span 4}

    .stat-label{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:34px;
      color:#fff2b8;
      font-weight:900;
      margin-bottom:8px;
      text-shadow:0 0 12px rgba(255,215,0,.08);
      animation:numberGlow 3s infinite alternate;
    }

    @keyframes numberGlow{
      from{transform:translateY(0)}
      to{transform:translateY(-2px)}
    }

    .stat-sub{color:#8d8d8d;font-size:13px}

    .operators-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .operator-card{
      background:linear-gradient(180deg, rgba(24,24,24,.96), rgba(10,10,10,.96));
      border:1px solid rgba(255,215,0,.10);
      border-radius:22px;
      padding:18px;
      transition:.25s;
      box-shadow:0 10px 24px rgba(0,0,0,.24);
    }
    .operator-card:hover{
      transform:translateY(-4px) scale(1.01);
      border-color:rgba(255,215,0,.18);
      box-shadow:0 18px 36px rgba(0,0,0,.34),0 0 20px rgba(255,215,0,.08);
    }

    .operator-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .operator-name{font-size:22px;color:#ffe89a;font-weight:800}
    .status{
      font-size:12px;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(143,240,164,.08);
      color:var(--green);
      border:1px solid rgba(143,240,164,.16);
    }
    .status.red{
      background:rgba(255,95,95,.10);
      color:#ff9b9b;
      border-color:rgba(255,95,95,.18);
    }

    .mini-stats{
      <div class="mini"><div class="label">Активні завдання</div><div class="value">${tasks.filter(x => !x.done).length}</div></div>
     display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
  align-items:stretch;
}

    .mini{
  min-height:108px;
  padding:18px 18px 16px;
  border-radius:22px;
  background:
    linear-gradient(180deg, rgba(22,22,22,.96), rgba(9,9,9,.96));
  border:1px solid rgba(255,215,0,.10);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.03),
    0 10px 24px rgba(0,0,0,.22),
    0 0 0 1px rgba(255,215,0,.03);
  transition:.25s;
  position:relative;
  overflow:hidden;
}
    .mini:hover{
  transform:translateY(-3px);
  border-color:rgba(255,215,0,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 16px 32px rgba(0,0,0,.30),
    0 0 20px rgba(255,215,0,.08);
}
    .mini.red{background:rgba(255,0,0,.05);border-color:rgba(255,0,0,.10)}
   .mini .label{
  font-size:12px;
  color:#bda85f;
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:1.4px;
  display:flex;
  align-items:center;
  gap:8px;
  opacity:.95;
}
    .mini .value{font-size:22px;color:#fff2b6;font-weight:800}

    .profile-hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .profile-name{font-size:30px;color:#ffe89a;margin-bottom:6px;font-weight:900}
    .profile-role{color:var(--muted);text-transform:uppercase;font-size:13px;letter-spacing:1px}

    .entry-list{display:flex;flex-direction:column;gap:12px;margin-top:16px}
    .entry{
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
      transition:.25s;
    }
    .entry:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.03);
      border-color:rgba(255,215,0,.14);
    }

    .entry-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .entry-title{color:#ffe89a;font-weight:800}
    .entry-meta{color:#9a9a9a;font-size:12px}
    .entry-text{color:#d8d8d8;line-height:1.55;font-size:14px;white-space:pre-wrap}

    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.8px;
      text-transform:uppercase;
      border:1px solid rgba(255,215,0,.12);
      background:rgba(255,215,0,.04);
      color:#f1d67d;
    }
    .tag.red{
      color:#ff9d9d;
      border-color:rgba(255,95,95,.16);
      background:rgba(255,95,95,.06);
    }
    .tag.green{
      color:#9ef0b0;
      border-color:rgba(143,240,164,.16);
      background:rgba(143,240,164,.06);
    }
    .tag.blue{
      color:#9dc7ff;
      border-color:rgba(125,180,255,.16);
      background:rgba(125,180,255,.06);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .list-simple{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
    }

    .list-item{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
      color:#ddd;
      font-size:14px;
      line-height:1.5;
      transition:.25s;
    }
    .list-item:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.03);
    }

    .empty{color:#8a8a8a;font-size:14px;padding:14px 0 4px}

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
    }

    th,td{
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid rgba(255,215,0,.08);
      font-size:14px;
      vertical-align:top;
    }

    th{
      color:#f3db86;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:1px;
      font-size:12px;
    }

    tbody tr{transition:.2s}
    tbody tr:hover{background:rgba(255,215,0,.03)}
    .rank-num{font-size:20px;font-weight:900;color:#fff1a8}
    .score-big{
      font-size:30px;
      font-weight:900;
      color:#fff3bf;
      animation:scorePulse 2s infinite alternate;
    }

    @keyframes scorePulse{
      from{transform:scale(1);text-shadow:0 0 8px rgba(255,215,0,.25)}
      to{transform:scale(1.04);text-shadow:0 0 18px rgba(255,0,0,.18)}
    }

    .exclamation{
      display:inline-flex;
      width:22px;height:22px;
      align-items:center;justify-content:center;
      border-radius:999px;
      background:rgba(255,95,95,.15);
      color:#ff9d9d;
      font-weight:900;
      border:1px solid rgba(255,95,95,.22);
      margin-right:8px;
      animation:blinkSoft 2s infinite;
    }

    @keyframes blinkSoft{
      0%,100%{box-shadow:0 0 0 rgba(255,95,95,0)}
      50%{box-shadow:0 0 16px rgba(255,95,95,.18)}

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        currentUser = null;
        currentProfile = null;
        document.getElementById("appScreen").classList.add("hidden");
        document.getElementById("loginScreen").classList.remove("hidden");
        return;
      }

      currentUser = user;
      currentProfile = await loadProfileByEmail(user.email);

      if (!currentProfile) {
        document.getElementById("loginMessage").textContent = "Немає профілю в Firestore users";
        await signOut(auth);
        return;
      }

      if (currentProfile.role === "operator") {
        await ensureOperatorStats(currentProfile);
      }

      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.title = `TLOD 32 | ${currentProfile.name}`;
      await renderApp();
    });
