<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TLOD 32 Luxury Panel</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
overflow-x:hidden;
}

h1{
text-align:center;
color:gold;
text-shadow:0 0 20px gold;
}

.container{
width:1200px;
margin:auto;
padding:30px;
}

.card{
background:#111;
border-radius:15px;
padding:20px;
margin-bottom:20px;
border:1px solid #333;
box-shadow:0 0 25px rgba(255,215,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 0 30px gold;
}

.tabs{
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.tab{
padding:10px 20px;
border-radius:8px;
cursor:pointer;
background:#111;
border:1px solid #333;
transition:0.3s;
}

.tab:hover{
box-shadow:0 0 15px gold;
}

button{
background:linear-gradient(45deg,gold,#b8860b);
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
box-shadow:0 0 15px gold;
}

input,textarea{
padding:8px;
border-radius:6px;
border:1px solid #444;
background:#000;
color:white;
width:100%;
margin-bottom:10px;
}

.leader{
font-size:28px;
color:gold;
text-shadow:0 0 20px gold;
}

.fire{
animation:fire 1s infinite alternate;
}

@keyframes fire{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

.progress{
height:14px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,gold,red);
}

.operator{
padding:10px;
border-bottom:1px solid #333;
}

</style>

</head>

<body>

<h1>TLOD 32 PANEL</h1>

<div class="container">

<div class="tabs">

<div class="tab" onclick="openTab('balances')">💰 Баланси</div>
<div class="tab" onclick="openTab('tasks')">📋 Завдання</div>
<div class="tab" onclick="openTab('reports')">📊 Звіти</div>
<div class="tab" onclick="openTab('rating')">🏆 Рейтинг</div>
<div class="tab" onclick="openTab('rytu')">📈 RYU / TYU</div>

</div>

<div id="balances" class="card">

<h2>Баланси операторів</h2>

<input id="balanceOperator" placeholder="Оператор">

<input id="balanceInput" placeholder="Баланс">

<button onclick="addBalance()">Додати баланс</button>

<h3>Середній баланс: <span id="avgBalance">0</span></h3>

<ul id="balanceList"></ul>

</div>

<div id="tasks" class="card" style="display:none">

<h2>Завдання</h2>

<input id="taskOperator" placeholder="Оператор">

<input id="taskInput" placeholder="Завдання">

<input type="date" id="taskDeadline">

<button onclick="addTask()">Додати</button>

<ul id="taskList"></ul>

</div>

<div id="reports" class="card" style="display:none">

<h2>Звіти операторів</h2>

<textarea id="reportText" placeholder="Напиши звіт"></textarea>

<button onclick="sendReport()">Відправити</button>

<ul id="reportList"></ul>

</div>

<div id="rating" class="card" style="display:none">

<h2>Рейтинг операторів</h2>

<div class="leader" id="leader"></div>

<ul id="ratingList"></ul>

</div>

<div id="rytu" class="card" style="display:none">

<h2>RYU / TYU</h2>

<input id="ryuOperator" placeholder="Оператор">

<input id="ryuValue" placeholder="RYU">

<input id="tyuValue" placeholder="TYU">

<button onclick="addRyu()">Додати</button>

<ul id="ryuList"></ul>

</div>
