<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TLOD 08 | Team Lead Cabinet</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    :root{
      --bg:#050505;
      --bg-soft:#0e0e0e;
      --card:#111111;
      --card-2:#151515;
      --gold:#ffd700;
      --gold-soft:#d4af37;
      --text:#ffffff;
      --muted:#cbbd88;
      --danger:#ff7b7b;
      --success:#8ff0a4;
      --blue:#9dc7ff;
      --border:rgba(255,215,0,.20);
      --shadow:0 0 30px rgba(255,215,0,.08);
    }

    body{
      background:
        radial-gradient(circle at top, rgba(255,215,0,.07), transparent 28%),
        linear-gradient(135deg,#000000,#090909 45%,#000000 100%);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      width:900px;
      height:900px;
      left:-240px;
      top:-300px;
      background:radial-gradient(circle, rgba(255,215,0,.10), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      animation:floatGlow1 14s ease-in-out infinite alternate;
    }

    body::after{
      content:"";
      position:fixed;
      width:800px;
      height:800px;
      right:-240px;
      bottom:-280px;
      background:radial-gradient(circle, rgba(212,175,55,.08), transparent 60%);
      filter:blur(120px);
      pointer-events:none;
      animation:floatGlow2 16s ease-in-out infinite alternate;
    }

    @keyframes floatGlow1{
      from{transform:translate(0,0);}
      to{transform:translate(140px,100px);}
    }

    @keyframes floatGlow2{
      from{transform:translate(0,0);}
      to{transform:translate(-140px,-100px);}
    }

    .particles{
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 35% 70%, rgba(255,215,0,.08) 0 2px, transparent 3px),
        radial-gradient(circle at 50% 35%, rgba(255,215,0,.10) 0 2px, transparent 3px),
        radial-gradient(circle at 75% 25%, rgba(255,215,0,.12) 0 2px, transparent 3px),
        radial-gradient(circle at 85% 70%, rgba(255,215,0,.09) 0 2px, transparent 3px);
      opacity:.7;
      animation:particlesMove 12s ease-in-out infinite alternate;
    }

    @keyframes particlesMove{
      from{transform:translateY(0);}
      to{transform:translateY(-16px);}
    }

    .corner{
      position:fixed;
      width:140px;
      height:140px;
      border:1px solid var(--border);
      z-index:1;
      pointer-events:none;
    }

    .top-left{top:24px;left:24px;border-right:none;border-bottom:none;}
    .top-right{top:24px;right:24px;border-left:none;border-bottom:none;}
    .bottom-left{bottom:24px;left:24px;border-right:none;border-top:none;}
    .bottom-right{bottom:24px;right:24px;border-left:none;border-top:none;}

    .hidden{display:none !important;}

    .screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      z-index:2;
    }

    .login-box{
      width:420px;
      max-width:100%;
      background:linear-gradient(180deg, rgba(18,18,18,.95), rgba(6,6,6,.96));
      border:1px solid rgba(255,215,0,.28);
      border-radius:28px;
      padding:38px 28px;
      box-shadow:
        0 0 40px rgba(255,215,0,.10),
        inset 0 0 24px rgba(255,215,0,.04);
      text-align:center;
      animation:showUp .9s ease;
    }

    @keyframes showUp{
      from{opacity:0; transform:translateY(16px);}
      to{opacity:1; transform:translateY(0);}
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border:1px solid rgba(255,215,0,.20);
      border-radius:999px;
      color:#f3de8f;
      background:rgba(255,215,0,.04);
      font-size:12px;
      letter-spacing:1px;
      margin-bottom:16px;
    }

    .gold-line{
      width:82px;
      height:3px;
      margin:0 auto 18px auto;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      box-shadow:0 0 16px rgba(255,215,0,.35);
    }

    h1{
      color:var(--gold);
      font-size:40px;
      letter-spacing:4px;
      text-shadow:0 0 12px rgba(255,215,0,.25);
      margin-bottom:10px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:2px;
      margin-bottom:24px;
    }

    .help{
      color:#9f9f9f;
      font-size:13px;
      line-height:1.6;
      margin-top:18px;
      text-align:left;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.05);
      border-radius:16px;
      padding:14px;
    }

    .input{
      width:100%;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(255,215,0,.18);
      background:#101010;
      color:white;
      outline:none;
      margin-bottom:14px;
      font-size:15px;
      transition:.2s;
    }

    .input:focus{
      border-color:var(--gold);
      box-shadow:0 0 14px rgba(255,215,0,.15);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#141414;
      font-weight:700;
      font-size:15px;
      letter-spacing:1px;
      transition:.2s;
      box-shadow:0 10px 25px rgba(255,215,0,.12);
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 30px rgba(255,215,0,.20);
    }

    .btn.secondary{
      background:transparent;
      color:var(--gold);
      border:1px solid rgba(255,215,0,.20);
      box-shadow:none;
    }

    .btn.small{
      width:auto;
      padding:10px 14px;
      font-size:13px;
      border-radius:12px;
    }

    #loginMessage{
      min-height:22px;
      margin-top:12px;
      color:var(--danger);
      font-size:14px;
    }

    .app{
      min-height:100vh;
      padding:26px;
      position:relative;
      z-index:2;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:24px;
      padding:18px 20px;
      border:1px solid rgba(255,215,0,.14);
      background:rgba(12,12,12,.85);
      border-radius:22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .brand-icon{
      width:52px;
      height:52px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      border:1px solid rgba(255,215,0,.25);
      color:var(--gold);
      font-size:28px;
      font-weight:800;
      box-shadow:inset 0 0 14px rgba(255,215,0,.05);
    }

    .brand-title{
      font-size:24px;
      color:var(--gold);
      letter-spacing:2px;
      margin-bottom:4px;
    }

    .brand-sub{
      color:var(--muted);
      font-size:13px;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .user-chip{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,215,0,.16);
      color:#f0d983;
      background:rgba(255,215,0,.04);
      font-size:13px;
    }

    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(18,18,18,.96), rgba(8,8,8,.96));
      border:1px solid rgba(255,215,0,.14);
      border-radius:24px;
      padding:20px;
      box-shadow:var(--shadow);
    }

    .card h2, .card h3{
      color:var(--gold);
      margin-bottom:14px;
      letter-spacing:1px;
    }

    .stat-card{
      grid-column:span 3;
      min-height:120px;
    }

    .stat-label{
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:34px;
      color:#fff4c2;
      font-weight:800;
      margin-bottom:8px;
    }

    .stat-sub{
      color:#8e8e8e;
      font-size:13px;
    }

    .wide{grid-column:span 8;}
    .side{grid-column:span 4;}
    .full{grid-column:span 12;}

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .tab-btn{
      border:1px solid rgba(255,215,0,.16);
      background:rgba(255,215,0,.04);
      color:#e7d084;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-size:13px;
      transition:.2s;
    }

    .tab-btn.active{
      background:linear-gradient(90deg,#b8860b,#ffd700,#caa63a);
      color:#151515;
      font-weight:700;
    }

    .operators-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .operator-card{
      background:linear-gradient(180deg, rgba(24,24,24,.98), rgba(10,10,10,.96));
      border:1px solid rgba(255,215,0,.14);
      border-radius:20px;
      padding:18px;
    }

    .operator-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .operator-name{
      font-size:22px;
      color:#ffe89a;
      font-weight:700;
    }

    .status{
      font-size:12px;
      border-radius:999px;
      padding:7px 10px;
      background:rgba(143,240,164,.08);
      color:var(--success);
      border:1px solid rgba(143,240,164,.18);
    }

    .mini-stats{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .mini{
      padding:12px;
      border-radius:16px;
      background:rgba(255,215,0,.04);
      border:1px solid rgba(255,215,0,.08);
    }

    .mini .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .mini .value{
      font-size:22px;
      color:#fff2b6;
      font-weight:700;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:12px;
    }

    textarea.input{
      min-height:100px;
      resize:vertical;
    }

    .entry-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:16px;
    }

    .entry{
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
    }

    .entry-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .entry-title{
      color:#ffe89a;
      font-weight:700;
    }

    .entry-meta{
      color:#9a9a9a;
      font-size:12px;
    }

    .entry-text{
      color:#d7d7d7;
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
    }

    .tag{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.8px;
      text-transform:uppercase;
      border:1px solid rgba(255,215,0,.14);
      background:rgba(255,215,0,.05);
      color:#f1d67d;
    }

    .tag.red{
      color:#ff9d9d;
      border-color:rgba(255,123,123,.16);
      background:rgba(255,123,123,.06);
    }

    .tag.green{
      color:#9ef0b0;
      border-color:rgba(143,240,164,.16);
      background:rgba(143,240,164,.06);
    }

    .tag.blue{
      color:#9dc7ff;
      border-color:rgba(125,180,255,.16);
      background:rgba(125,180,255,.06);
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .empty{
      color:#8c8c8c;
      font-size:14px;
      padding:14px 0 4px 0;
    }

    .operator-dashboard{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:18px;
    }

    .operator-main{grid-column:span 8;}
    .operator-side{grid-column:span 4;}

    .profile-hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .profile-name{
      font-size:30px;
      color:#ffe89a;
      margin-bottom:6px;
    }

    .profile-role{
      color:var(--muted);
      text-transform:uppercase;
      font-size:13px;
      letter-spacing:1px;
    }

    .note-box{
      padding:14px;
      border-radius:16px;
      background:rgba(255,215,0,.04);
      border:1px solid rgba(255,215,0,.08);
      color:#ddd;
      line-height:1.55;
      font-size:14px;
    }

    .list-simple{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:8px;
    }

    .list-item{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,215,0,.08);
      color:#ddd;
      font-size:14px;
      line-height:1.5;
    }

    .muted{
      color:#9a9a9a;
      font-size:13px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
    }

    th, td{
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid rgba(255,215,0,.08);
      font-size:14px;
    }

    th{
      color:#f3db86;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1px;
      font-size:12px;
    }

    .rank-num{
      font-size:20px;
      font-weight:800;
      color:#fff1a8;
    }

    @media (max-width: 1100px){
      .stat-card{grid-column:span 6;}
      .wide, .side, .operator-main, .operator-side{grid-column:span 12;}
      .operators-grid{grid-template-columns:1fr;}
    }

    @media (max-width: 720px){
      .app{padding:14px;}
      .topbar{padding:16px; border-radius:18px;}
      .dashboard-grid{gap:14px;}
      .stat-card{grid-column:span 12;}
      .form-grid, .mini-stats{grid-template-columns:1fr;}
      .profile-name{font-size:24px;}
      h1{font-size:34px;}
    }
  </style>
</head>

      if (raw) {
        try {
          return JSON.parse(raw);
        } catch (e) {
          return JSON.parse(JSON.stringify(defaultData));
        }
      }
      return JSON.parse(JSON.stringify(defaultData));
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function money(n){
      return "$" + Number(n).toLocaleString("en-US");
    }

    function login() {
      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("loginMessage");

      if (!users[username] || users[username].password !== password) {
        message.textContent = "Невірний логін або пароль";
        return;
      }

      currentUser = {
        username,
        role: users[username].role,
        displayName: users[username].displayName
      };

      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.title = `TLOD 08 | ${currentUser.displayName}`;
      renderApp();
    }

    function logout() {
      currentUser = null;
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("loginMessage").textContent = "";
      document.getElementById("password").value = "";
      document.title = "TLOD 08 | Team Lead Cabinet";
    }

    function setAdminTab(tab){
      adminTab = tab;
      renderApp();
    }

    function renderApp() {
      const app = document.getElementById("appScreen");
      if (!currentUser) return;

      if (currentUser.role === "admin") {
        app.innerHTML = renderAdminDashboard();
      } else {
        app.innerHTML = renderOperatorDashboard(currentUser.username);
      }
    }

    function renderShell(content) {
      return `
        <div class="topbar">
          <div class="brand-wrap">
            <div class="brand-icon">8</div>
            <div>
              <div class="brand-title">TLOD 08</div>
              <div class="brand-sub">Luxury team control system</div>
            </div>
          </div>

          <div class="topbar-right">
            <div class="user-chip">${escapeHtml(currentUser.displayName)}</div>
            <button class="btn secondary small" onclick="logout()">Вийти</button>
          </div>
        </div>
        ${content}
      `;
    }

    function getGlobalStats() {
      const ops = Object.values(state.operators);
      const totalRequests = ops.reduce((sum, op) => sum + Number(op.stats.requests || 0), 0);
      const totalErrors = ops.reduce((sum, op) => sum + op.errors.length, 0);
      const totalRevenue = ops.reduce((sum, op) => sum + Number(op.stats.revenue || 0), 0);
      const totalFines = ops.reduce((sum, op) => sum + Number(op.stats.fines || 0), 0);

      return {
        totalRequests,
        totalErrors,
        totalRevenue: money(totalRevenue),
        totalFines,
        operators: ops.length
      };
    }

    function getRankedOperators() {
      const list = Object.entries(state.operators).map(([key, op]) => {
        const score =
          (Number(op.stats.revenue) / 100) +
          (Number(op.stats.conversion) * 12) +
          (Number(op.stats.requests) * 2) -
          (Number(op.stats.fines) * 18) -
          (op.errors.length * 8);

        return {
          key,
          ...op,
          score: Math.round(score)
        };
      });

      list.sort((a,b) => b.score - a.score);
      return list;
    }

    function renderAdminDashboard() {
      const stats = getGlobalStats();

      return renderShell(`
        <div class="tabs">
          <button class="tab-btn ${adminTab==="dashboard" ? "active" : ""}" onclick="setAdminTab('dashboard')">Головна</button>
          <button class="tab-btn ${adminTab==="rating" ? "active" : ""}" onclick="setAdminTab('rating')">Рейтинг</button>
          <button class="tab-btn ${adminTab==="fines" ? "active" : ""}" onclick="setAdminTab('fines')">Штрафні бали</button>
          <button class="tab-btn ${adminTab==="week" ? "active" : ""}" onclick="setAdminTab('week')">План на тиждень</button>
        </div>

        ${adminTab === "dashboard" ? renderAdminMain(stats) : ""}
        ${adminTab === "rating" ? renderRatingTab() : ""}
        ${adminTab === "fines" ? renderFinesTab() : ""}
        ${adminTab === "week" ? renderWeekTab() : ""}
      `);
    }

    function renderAdminMain(stats){
      return `
        <div class="dashboard-grid">
          <div class="card stat-card">
            <div class="stat-label">Оператори</div>
            <div class="stat-value">${stats.operators}</div>
            <div class="stat-sub">Активних у системі</div>
          </div>

          <div class="card stat-card">
            <div class="stat-label">Заявки</div>
            <div class="stat-value">${stats.totalRequests}</div>
            <div class="stat-sub">Сумарно по команді</div>
          </div>

          <div class="card stat-card">
            <div class="stat-label">Помилки</div>
            <div class="stat-value">${stats.totalErrors}</div>
            <div class="stat-sub">Зафіксовано в кабінеті</div>
          </div>

          <div class="card stat-card">
            <div class="stat-label">Прибуток</div>
            <div class="stat-value">${stats.totalRevenue}</div>
            <div class="stat-sub">Загальний показник</div>
          </div>

          <div class="card wide">
            <h2>Оператори</h2>
            <div class="operators-grid">
              ${Object.entries(state.operators).map(([key, op]) => `
                <div class="operator-card">
                  <div class="operator-head">
                    <div class="operator-name">${escapeHtml(op.name)}</div>
                    <div class="status">${escapeHtml(op.status)}</div>
                  </div>

                  <div class="mini-stats">
                    <div class="mini">
                      <div class="label">Заявки</div>
                      <div class="value">${escapeHtml(op.stats.requests)}</div>
                    </div>
                    <div class="mini">
                      <div class="label">Конверсія</div>
                      <div class="value">${escapeHtml(op.stats.conversion)}%</div>
                    </div>
                    <div class="mini">
                      <div class="label">Прибуток</div>
                      <div class="value">${money(op.stats.revenue)}</div>
                    </div>
                    <div class="mini">
                      <div class="label">Штрафні</div>
                      <div class="value">${op.stats.fines}</div>
                    </div>
                  </div>

                  <div class="actions">
                    <button class="btn small" onclick="focusOperatorForm('${key}')">Додати запис</button>
                    <button class="btn secondary small" onclick="openOperatorPreview('${key}')">Перегляд</button>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="card side">
            <h2>Додати помилку / нотатку</h2>
            <div class="form-grid">
              <select id="entryOperator" class="input">
                <option value="oleg">Олег</option>
                <option value="artem">Артем</option>
                <option value="senya">Сєня</option>
              </select>

              <select id="entryKind" class="input">
                <option value="error">Помилка</option>
                <option value="note">Нотатка</option>
                <option value="goal">Ціль</option>
              </select>
            </div>

            <div class="form-grid">
              <input id="entryType" class="input" type="text" placeholder="Тип: Скрипт / Швидкість / Звіт">
              <select id="entrySeverity" class="input">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>

            <input id="entryTitle" class="input" type="text" placeholder="Короткий заголовок">
            <textarea id="entryText" class="input" placeholder="Опиши деталі, що сталося і що треба покращити"></textarea>
            <button class="btn" onclick="addEntry()">Зберегти запис</button>

            <div class="help" style="margin-top:14px;">
              Тут ти можеш вести:
              <br>— помилки
              <br>— сильні сторони
              <br>— задачі на тиждень
              <br>— персональні нотатки для кожного
            </div>
          </div>

          <div class="card full">
            <h2>Останні записи</h2>
            <div class="entry-list">
              ${renderRecentEntries()}
            </div>
          </div>
        </div>
      `;
    }

    function renderRatingTab(){
      const ranked = getRankedOperators();

      return `
        <div class="dashboard-grid">
          <div class="card full">
            <h2>Рейтинг операторів</h2>
            <table>
              <thead>
                <tr>
                  <th>Місце</th>
                  <th>Оператор</th>
                  <th>Заявки</th>
                  <th>Конверсія</th>
                  <th>Прибуток</th>
                  <th>Штрафні</th>
                  <th>Помилки</th>
                  <th>Score</th>
                </tr>
              </thead>
              <tbody>
                ${ranked.map((op, idx) => `
                  <tr>
                    <td class="rank-num">#${idx + 1}</td>
                    <td>${escapeHtml(op.name)}</td>
                    <td>${op.stats.requests}</td>
                    <td>${op.stats.conversion}%</td>
                    <td>${money(op.stats.revenue)}</td>
                    <td>${op.stats.fines}</td>
                    <td>${op.errors.length}</td>
                    <td>${op.score}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderFinesTab(){
      return `
        <div class="dashboard-grid">
          <div class="card wide">
            <h2>Штрафні бали</h2>
            <table>
              <thead>
                <tr>
                  <th>Оператор</th>
                  <th>Поточні бали</th>
                  <th>Дія</th>
                </tr>
              </thead>
              <tbody>
                ${Object.entries(state.operators).map(([key, op]) => `
                  <tr>
                    <td>${escapeHtml(op.name)}</td>
                    <td>${op.stats.fines}</td>
                    <td>
                      <button class="btn small" onclick="changeFine('${key}', 1)">+1</button>
                      <button class="btn secondary small" onclick="changeFine('${key}', -1)">-1</button>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>

          <div class="card side">
            <h2>Пояснення</h2>
            <div class="note-box">
              Штрафні бали можна використовувати за:
              <br><br>— запізнення
              <br>— довгі відповіді
              <br>— помилки в звітах
              <br>— пропуски по скрипту
              <br><br>Менше балів = кращий результат.
            </div>
          </div>
        </div>
      `;
    }

    function renderWeekTab(){
      return `
        <div class="dashboard-grid">
          ${Object.entries(state.operators).map(([key, op]) => `
            <div class="card" style="grid-column:span 4;">
              <h2>${escapeHtml(op.name)}</h2>
              <div class="list-simple">
                ${op.weeklyPlan.map((item, i) => `
                  <div class="list-item">
                    <strong>${i + 1}.</strong> ${escapeHtml(item)}
                  </div>
                `).join("")}
              </div>

              <div class="actions">
                <button class="btn small" onclick="addWeeklyPlan('${key}')">Додати пункт</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderRecentEntries() {
      const all = [];

      Object.entries(state.operators).forEach(([key, op]) => {
        op.errors.forEach(item => {
          all.push({ ...item, operatorKey: key, operatorName: op.name, kind: "error" });
        });
        op.notes.forEach(item => {
          all.push({ ...item, operatorKey: key, operatorName: op.name, kind: item.type === "Ціль" ? "goal" : "note" });
        });
      });

      all.sort((a, b) => String(b.date).localeCompare(String(a.date)));

      if (!all.length) return `<div class="empty">Поки що записів немає.</div>`;

      return all.slice(0, 10).map(item => `
        <div class="entry">
          <div class="entry-top">
            <div class="entry-title">${escapeHtml(item.operatorName)} — ${escapeHtml(item.title || "Без назви")}</div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              ${renderKindTag(item.kind, item.severity)}
              <div class="entry-meta">${escapeHtml(item.date)}</div>
            </div>
          </div>
          <div class="entry-text">${escapeHtml(item.text || "")}</div>
        </div>
      `).join("");
    }

    function renderKindTag(kind, severity) {
      if (kind === "error") {
        const sev = severity === "high" ? "red" : severity === "low" ? "blue" : "";
        return `<span class="tag ${sev}">Помилка</span>`;
      }
      if (kind === "goal") return `<span class="tag green">Ціль</span>`;
      return `<span class="tag">Нотатка</span>`;
    }

    function renderOperatorDashboard(username) {
      const op = state.operators[username];

      return renderShell(`
        <div class="operator-dashboard">
          <div class="card operator-main">
            <div class="profile-hero">
              <div>
                <div class="profile-name">${escapeHtml(op.name)}</div>
                <div class="profile-role">Operator private cabinet</div>
              </div>
              <div class="status">${escapeHtml(op.status)}</div>
            </div>

            <div class="mini-stats">
              <div class="mini">
                <div class="label">Заявки</div>
                <div class="value">${escapeHtml(op.stats.requests)}</div>
              </div>
              <div class="mini">
                <div class="label">Конверсія</div>
                <div class="value">${escapeHtml(op.stats.conversion)}%</div>
              </div>
              <div class="mini">
                <div class="label">Прибуток</div>
                <div class="value">${money(op.stats.revenue)}</div>
              </div>
              <div class="mini">
                <div class="label">Штрафні</div>
                <div class="value">${escapeHtml(op.stats.fines)}</div>
              </div>
            </div>
          </div>

          <div class="card operator-side">
            <h3>Фокус на зараз</h3>
            <div class="note-box">
              Тримай стабільний темп, уважно допрацьовуй заперечення і дивись останні нотатки від Team Lead.
            </div>
          </div>

          <div class="card operator-main">
            <h3>Мої помилки / розбір</h3>
            <div class="entry-list">
              ${op.errors.length ? op.errors.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title">${escapeHtml(item.title)}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      ${renderKindTag("error", item.severity)}
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  <div class="entry-meta" style="margin-bottom:8px;">Тип: ${escapeHtml(item.type)}</div>
                  <div class="entry-text">${escapeHtml(item.text)}</div>
                </div>
              `).join("") : `<div class="empty">Помилок поки немає.</div>`}
            </div>
          </div>

          <div class="card operator-side">
            <h3>Мої сильні сторони</h3>
            <div class="list-simple">
              ${op.strengths.map(item => `<div class="list-item">${escapeHtml(item)}</div>`).join("")}
            </div>
          </div>

          <div class="card operator-main">
            <h3>Нотатки від Team Lead</h3>
            <div class="entry-list">
              ${op.notes.length ? op.notes.map(item => `
                <div class="entry">
                  <div class="entry-top">
                    <div class="entry-title">${escapeHtml(item.title)}</div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                      ${item.type === "Ціль" ? `<span class="tag green">Ціль</span>` : `<span class="tag">Нотатка</span>`}
                      <div class="entry-meta">${escapeHtml(item.date)}</div>
                    </div>
                  </div>
                  ${item.type ? `<div class="entry-meta" style="margin-bottom:8px;">Тип: ${escapeHtml(item.type)}</div>` : ""}
                  <div class="entry-text">${escapeHtml(item.text)}</div>
                </div>
              `).join("") : `<div class="empty">Нотаток поки немає.</div>`}
            </div>
          </div>

          <div class="card operator-side">
            <h3>План на тиждень</h3>
            <div class="list-simple">
              ${op.weeklyPlan.map(item => `<div class="list-item">${escapeHtml(item)}</div>`).join("")}
            </div>
          </div>
        </div>
      `);
    }

    function addEntry() {
      const operatorKey = document.getElementById("entryOperator").value;
      const kind = document.getElementById("entryKind").value;
      const type = document.getElementById("entryType").value.trim() || "Без типу";
      const severity = document.getElementById("entrySeverity").value;
      const title = document.getElementById("entryTitle").value.trim();
      const text = document.getElementById("entryText").value.trim();

      if (!title || !text) {
        alert("Заповни заголовок і текст.");
        return;
      }

      const item = {
        id: createId(),
        date: new Date().toISOString().slice(0, 10),
        type: kind === "goal" ? "Ціль" : type,
        severity,
        title,
        text,
        author: currentUser.username
      };

      if (kind === "error") {
        state.operators[operatorKey].errors.unshift(item);
      } else if (kind === "goal") {
        state.operators[operatorKey].notes.unshift({ ...item, type: "Ціль" });
        state.operators[operatorKey].goals.unshift(title);
      } else {
        state.operators[operatorKey].notes.unshift({ ...item, type: "Нотатка" });
      }

      saveData();
      clearAdminForm();
      renderApp();
    }

    function clearAdminForm() {
      const type = document.getElementById("entryType");
      const title = document.getElementById("entryTitle");
      const text = document.getElementById("entryText");
      const severity = document.getElementById("entrySeverity");
      const kind = document.getElementById("entryKind");

      if (type) type.value = "";
      if (title) title.value = "";
      if (text) text.value = "";
      if (severity) severity.value = "medium";
      if (kind) kind.value = "error";
    }

    function focusOperatorForm(operatorKey) {
      adminTab = "dashboard";
      renderApp();
      setTimeout(() => {
        const select = document.getElementById("entryOperator");
        if (select) {
          select.value = operatorKey;
          window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        }
      }, 50);
    }

    function openOperatorPreview(operatorKey) {
      const savedUser = currentUser;
      currentUser = {
        username: operatorKey,
        role: "operator",
        displayName: state.operators[operatorKey].name
      };
      renderApp();

      const app = document.getElementById("appScreen");
      const backBar = document.createElement("div");
      backBar.style.marginBottom = "16px";
      backBar.innerHTML = `<button class="btn secondary small" onclick="backToAdmin()">← Назад до Team Lead</button>`;
      app.prepend(backBar);

      window.backToAdmin = function() {
        currentUser = savedUser;
        renderApp();
      };
    }

    function changeFine(operatorKey, delta){
      const current = Number(state.operators[operatorKey].stats.fines || 0);
      const next = Math.max(0, current + delta);
      state.operators[operatorKey].stats.fines = next;
      saveData();
      renderApp();
    }

    function addWeeklyPlan(operatorKey){
      const text = prompt("Введи новий пункт плану на тиждень:");
      if (!text || !text.trim()) return;
      state.operators[operatorKey].weeklyPlan.push(text.trim());
      saveData();
      renderApp();
    }
  </script>
</body>
</html>
